<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プログラム導入管理 - GR / 美彩心</title>
<style>
:root{
  --primary:#2563eb;--primary-dark:#1e40af;--primary-light:#dbeafe;
  --accent:#7c3aed;--accent-light:#ede9fe;
  --green:#10b981;--green-bg:#ecfdf5;
  --yellow:#f59e0b;--yellow-bg:#fffbeb;
  --red:#ef4444;--red-bg:#fef2f2;
  --teal:#0f766e;--teal-bg:#f0fdfa;
  --navy:#1e40af;--navy-bg:#eff6ff;
  --pink:#db2777;--pink-light:#fce7f3;--pink-dark:#9d174d;
  --gray50:#f8fafc;--gray100:#f1f5f9;--gray200:#e2e8f0;--gray300:#cbd5e1;--gray400:#94a3b8;--gray500:#64748b;--gray700:#334155;--gray900:#0f172a;
  --shadow-sm:0 1px 2px rgba(0,0,0,.06);--shadow:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 8px 30px rgba(0,0,0,.12);
  --radius:12px;--radius-lg:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--gray100);color:var(--gray900);line-height:1.5}
input,select,button{font-family:inherit;outline:none}
input:focus,select:focus{border-color:var(--primary) !important;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
button{transition:all .15s ease}
button:hover{opacity:.9;transform:translateY(-1px)}
button:active{transform:translateY(0)}
table{border-collapse:collapse;width:100%}
::-webkit-scrollbar{height:6px;width:6px}
::-webkit-scrollbar-thumb{background:var(--gray300);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gray400)}

.badge{display:inline-flex;align-items:center;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;letter-spacing:.3px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:13px;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.25)}
.btn-primary:hover{background:var(--primary-dark);box-shadow:0 4px 12px rgba(37,99,235,.35)}
.btn-ghost{background:transparent;color:var(--gray500);border:1.5px solid var(--gray200)}
.btn-ghost:hover{background:var(--gray50);border-color:var(--gray300)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:8px;border:none;cursor:pointer;font-weight:600;transition:all .2s}

.card{background:#fff;border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04);transition:box-shadow .2s}
.card:hover{box-shadow:var(--shadow-lg)}

.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.active{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:20px;padding:32px;max-width:1060px;width:94%;max-height:90vh;overflow-y:auto;box-shadow:0 25px 65px rgba(0,0,0,.25);transform:scale(.96);transition:transform .25s}
.overlay.active .modal{transform:scale(1)}

.th{padding:12px 10px;text-align:left;font-weight:700;color:var(--gray500);border-bottom:2px solid var(--gray200);font-size:11px;white-space:nowrap;text-transform:uppercase;letter-spacing:.5px}
.td{padding:10px;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--gray100);transition:background .15s}
tbody tr:hover{background:var(--gray50)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.pcell{padding:4px;text-align:center;cursor:pointer}
.pcell>div{border-radius:10px;padding:6px 3px;min-width:58px;transition:all .15s}
.pcell>div:hover{transform:scale(1.08);box-shadow:var(--shadow)}

.stat-card{background:#fff;border-radius:var(--radius-lg);padding:20px 24px;box-shadow:var(--shadow);flex:1 1 160px;min-width:140px;position:relative;overflow:hidden;transition:all .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}

.bar-bg{background:var(--gray200);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .5s ease-out}

.form-field{margin-bottom:14px}
.form-field label{display:block;font-size:12px;font-weight:700;color:var(--gray500);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.form-field input,.form-field select{width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid var(--gray200);font-size:13px;box-sizing:border-box;transition:all .2s;background:#fff}
.form-field input:hover,.form-field select:hover{border-color:var(--gray300)}

.hidden{display:none !important}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeIn .3s ease-out}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.pulse{animation:pulse 2s ease-in-out infinite}

.nav-pill{padding:8px 18px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:12px;transition:all .2s;position:relative}
.nav-pill.active{background:#fff;color:var(--primary-dark);box-shadow:var(--shadow)}
.nav-pill:not(.active){background:rgba(255,255,255,.12);color:rgba(255,255,255,.85)}
.nav-pill:not(.active):hover{background:rgba(255,255,255,.22)}

/* Program type badges */
.pgm-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 10px;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.3px}
.pgm-gr{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
.pgm-bisai{background:var(--pink-light);color:var(--pink-dark);border:1px solid #f9a8d4}

/* Checkbox toggle */
.toggle-label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--gray700);padding:6px 0}
.toggle-label input[type=checkbox]{width:18px;height:18px;accent-color:var(--primary);cursor:pointer}

/* Save indicator */
#save-indicator.show{opacity:1}
</style>
</head>
<body>

<!-- ====== LOGIN ====== -->
<div id="login" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 30%,#2563eb 65%,#7c3aed 100%);position:relative;overflow:hidden">
  <div style="position:absolute;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:rgba(124,58,237,.15)"></div>
  <div style="position:absolute;bottom:-80px;left:-80px;width:300px;height:300px;border-radius:50%;background:rgba(37,99,235,.12)"></div>
  <div class="animate-in" style="background:#fff;border-radius:24px;padding:52px 44px;width:420px;box-shadow:0 25px 65px rgba(0,0,0,.35);text-align:center;position:relative;z-index:1">
    <div style="display:flex;gap:10px;justify-content:center;margin-bottom:24px">
      <div style="width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-weight:900;box-shadow:0 6px 20px rgba(37,99,235,.3)">GR</div>
      <div style="width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--pink),#f472b6);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:900;box-shadow:0 6px 20px rgba(219,39,119,.3)">美彩心</div>
    </div>
    <h1 style="font-size:22px;font-weight:800;margin-bottom:6px;color:var(--gray900)">プログラム導入管理</h1>
    <p style="font-size:13px;color:var(--gray400);margin-bottom:32px">GR / 美彩心 統合管理システム</p>
    <div style="position:relative;margin-bottom:12px">
      <input type="password" id="pw-input" placeholder="管理パスワード" style="width:100%;padding:14px 20px;border-radius:14px;border:2px solid var(--gray200);font-size:16px;text-align:center;letter-spacing:3px;box-sizing:border-box;transition:all .2s" onkeydown="if(event.key==='Enter')tryLogin()" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--gray200)'">
    </div>
    <div id="pw-error" style="color:var(--red);font-size:12px;font-weight:600;height:22px;line-height:22px"></div>
    <button onclick="tryLogin()" style="width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(37,99,235,.35);transition:all .2s;margin-top:4px" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">ログイン</button>
    <div style="font-size:11px;color:var(--gray300);margin-top:20px;letter-spacing:1px">AUTHORIZED PERSONNEL ONLY</div>
  </div>
</div>

<!-- ====== MAIN APP ====== -->
<div id="app" class="hidden">
  <div style="background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 60%,#4f7df5 100%);color:#fff;padding:0 32px;display:flex;justify-content:space-between;align-items:center;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(30,64,175,.25)">
    <div style="display:flex;align-items:center;gap:14px">
      <div style="display:flex;gap:6px">
        <div style="width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;backdrop-filter:blur(4px)">GR</div>
        <div style="width:34px;height:34px;border-radius:9px;background:rgba(219,39,119,.35);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;backdrop-filter:blur(4px)">美彩心</div>
      </div>
      <div>
        <h1 style="font-size:16px;font-weight:700;letter-spacing:.3px">プログラム導入管理</h1>
        <div style="font-size:10px;opacity:.7;letter-spacing:.5px">GR 全10種+スキルアップ研修 / 美彩心</div>
      </div>
    </div>
    <div class="flex" style="gap:4px">
      <div style="background:rgba(0,0,0,.15);border-radius:12px;padding:3px;display:flex;gap:2px">
        <button class="nav-pill active" id="nav-matrix" onclick="switchView('matrix')">導入マップ</button>
        <button class="nav-pill" id="nav-skillup" onclick="switchView('skillup')">スキルアップ研修</button>
        <button class="nav-pill" id="nav-list" onclick="switchView('list')">店舗管理</button>
      </div>
      <div style="width:1px;height:28px;background:rgba(255,255,255,.2);margin:0 8px"></div>
      <button onclick="logout()" style="padding:8px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.25);background:transparent;color:#fff;cursor:pointer;font-size:11px;font-weight:600;transition:all .2s" onmouseover="this.style.background='rgba(255,255,255,.1)'" onmouseout="this.style.background='transparent'">ログアウト</button>
    </div>
  </div>

  <div style="padding:24px 32px;max-width:1440px;margin:0 auto">
    <div id="filter-bar" class="flex" style="margin-bottom:20px">
      <select id="f-area" onchange="render()" style="padding:10px 14px;border-radius:12px;border:1.5px solid var(--gray200);font-size:13px;background:#fff;cursor:pointer;min-width:120px">
        <option value="">全エリア</option><option>中央本部</option><option>西エリア</option>
      </select>
      <select id="f-status" onchange="render()" style="padding:10px 14px;border-radius:12px;border:1.5px solid var(--gray200);font-size:13px;background:#fff;cursor:pointer;min-width:120px">
        <option value="">全ステータス</option><option>運営中</option><option>休止中</option><option>終了</option>
      </select>
      <select id="f-program" onchange="render()" style="padding:10px 14px;border-radius:12px;border:1.5px solid var(--gray200);font-size:13px;background:#fff;cursor:pointer;min-width:140px">
        <option value="">全プログラム</option><option value="gr">GR のみ</option><option value="bisai">美彩心 のみ</option><option value="both">両方導入</option>
      </select>
      <div id="search-wrap" class="hidden" style="flex:1 1 180px;position:relative">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--gray400)">&#128269;</span>
        <input id="f-search" placeholder="店舗名・エリアで検索..." oninput="render()" style="width:100%;padding:10px 14px 10px 36px;border-radius:12px;border:1.5px solid var(--gray200);font-size:13px">
      </div>
      <div style="margin-left:auto" class="flex">
        <button class="btn btn-primary hidden" id="btn-add" onclick="openAdd()">+ 新規登録</button>
      </div>
    </div>
    <div id="content" class="animate-in"></div>
  </div>
</div>

<!-- ====== MODAL ====== -->
<!-- Save Indicator -->
<div id="save-indicator" style="position:fixed;bottom:24px;right:24px;background:var(--green);color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .3s;box-shadow:0 4px 16px rgba(16,185,129,.35);z-index:2000;display:flex;align-items:center;gap:8px">&#10003; 保存しました（全ユーザーに同期済み）</div>

<div id="modal-overlay" class="overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()" id="modal-body"></div>
</div>

<script>
// ━━━ Firebase REST API（CDN不要） ━━━
const FB_URL="https://higashi-f2cd0-default-rtdb.firebaseio.com/program-management";

const ADMIN_PASSWORD="daimaru";

// ━━━ GR Program Definitions ━━━
const BEG=[
  {key:"beginner1",label:"Intro",short:"IN",color:"#14b8a6"},
  {key:"beginner2",label:"Basic",short:"BA",color:"#0d9488"},
  {key:"beginner3",label:"Basic/waist",short:"BW",color:"#0f766e"},
  {key:"beginner4",label:"Basic/hip",short:"BH",color:"#115e59"},
];
const MID=[
  {key:"intermediate1",label:"①Intermediate",short:"INT",color:"#8b5cf6"},
  {key:"intermediate2",label:"②Back&Core",short:"B&C",color:"#3b82f6"},
  {key:"intermediate3",label:"③Lowerbody",short:"LB",color:"#06b6d4"},
  {key:"intermediate4",label:"④WaistShape",short:"WS",color:"#10b981"},
  {key:"intermediate5",label:"⑤Jumpboard",short:"JB",color:"#f59e0b"},
  {key:"intermediate6",label:"⑥Core Flow",short:"CF",color:"#ef4444"},
];
const ALL_P=[...BEG,...MID];

// ━━━ 美彩心 Program Definition ━━━
const BISAI={key:"bisaishin",label:"美彩心",short:"美彩心",color:"#db2777"};

const AREAS=["中央本部","西エリア"];
const S_COL={"運営中":"#10b981","休止中":"#f59e0b","終了":"#ef4444"};
const A_COL={"中央本部":"#6366f1","西エリア":"#f97316"};
const DOCS_GR=[{k:"intentLetter",l:"意向書"},{k:"estimate",l:"見積書"},{k:"purchaseOrder",l:"発注書"},{k:"deliveryDate",l:"納品日"},{k:"contract",l:"契約書"},{k:"trainingApplication",l:"養成申込"}];
const DOCS_BISAI=[{k:"b_intentLetter",l:"意向書"},{k:"b_estimate",l:"見積書"},{k:"b_purchaseOrder",l:"発注書"},{k:"b_deliveryDate",l:"納品日"},{k:"b_contract",l:"契約書"},{k:"b_trainingApplication",l:"養成申込"}];

// ━━━ Helpers ━━━
const isIn=v=>v&&v!==""&&v!=="ー";
const isPlan=v=>v&&v.includes("予定");
const parseCD=v=>{if(!v)return null;const m=v.match(/^(\d{4})-(\d{1,2})/);return m?{year:+m[1],month:+m[2]}:null;};
const fmtYM=d=>d?d.year+"年"+d.month+"月":"ー";
const getSched=(c,n=6)=>{if(!c)return[];const o=[];let y=c.year,m=c.month;for(let i=0;i<n;i++){m+=6;if(m>12){m-=12;y++;}o.push({year:y,month:m,idx:i+1});}return o;};
const schedSt=s=>{const d=new Date(),ny=d.getFullYear(),nm=d.getMonth()+1;if(s.year<ny||(s.year===ny&&s.month<nm))return"past";if(s.year===ny&&s.month===nm)return"current";return"future";};
const getNext=st=>{const c=parseCD(st.completionDate);if(!c)return null;const sc=getSched(c,20);const d=new Date(),ny=d.getFullYear(),nm=d.getMonth()+1;return sc.find(s=>s.year>ny||(s.year===ny&&s.month>=nm))||null;};
const esc=s=>s?s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"):"";
const pctColor=p=>p===100?"#10b981":p>=50?"#3b82f6":"#f59e0b";
const hasGR=st=>st.programs&&st.programs.includes("GR");
const hasBisai=st=>st.programs&&st.programs.includes("美彩心");
const pgmBadges=st=>{let h="";if(hasGR(st))h+=`<span class="pgm-badge pgm-gr">GR</span>`;if(hasBisai(st))h+=`<span class="pgm-badge pgm-bisai">美彩心</span>`;return h;};

// ━━━ Data Builder ━━━
const mk=(id,area,name,status,docs,tr,mo,hist,beg,int,cd,programs,bisaiStatus,bisaiDocs,contact)=>{
  const ct=contact||{};
  const o={id,area,storeName:name,status,
    contactPerson:ct.person||"",contactEmail:ct.email||"",contactAddress:ct.address||"",contactPhone:ct.phone||"",
    intentLetter:docs[0]||"",estimate:docs[1]||"",purchaseOrder:docs[2]||"",deliveryDate:docs[3]||"",contract:docs[4]||"",
    trainingSchedule:tr[0]||"",trainingApplication:tr[1]||"",
    renewalMonth1:mo[0]||"",renewalMonth2:mo[1]||"",trainingHistory:hist,
    beginner1:beg[0]||"",beginner2:beg[1]||"",beginner3:beg[2]||"",beginner4:beg[3]||"",
    intermediate1:int[0]||"",intermediate2:int[1]||"",intermediate3:int[2]||"",intermediate4:int[3]||"",intermediate5:int[4]||"",intermediate6:int[5]||"",
    completionDate:cd||"",
    programs:programs||["GR"],
    bisaishin:bisaiStatus||"",
    b_intentLetter:(bisaiDocs&&bisaiDocs[0])||"",b_estimate:(bisaiDocs&&bisaiDocs[1])||"",b_purchaseOrder:(bisaiDocs&&bisaiDocs[2])||"",b_deliveryDate:(bisaiDocs&&bisaiDocs[3])||"",b_contract:(bisaiDocs&&bisaiDocs[4])||"",b_trainingApplication:(bisaiDocs&&bisaiDocs[5])||"",
    b_trainingSchedule:"",b_renewalMonth1:"",b_renewalMonth2:"",b_trainingHistory:""
  };
  return o;
};

// ━━━ Default Data (existing GR stores) ━━━
const DEFAULT_DATA=[
  mk(1,"中央本部","Lucina北小金","運営中",["済","済","済","済","済"],["済","済"],["3月","9月"],"2025/03/10",["済","済","済","済"],["Intermediate","2402_Back &Core","2409_Lowerbody","2503_Waist Shape","2509_Jumpboard","2603_Core Flow"],"2026-03",["GR"]),
  mk(2,"中央本部","Lucina北浦和","運営中",["済","済","済","済","済"],["済","済"],["3月","9月"],"2025/03/10",["済","済","済","済"],["Intermediate","2402_Back &Core","2409_Lowerbody","2503_Waist Shape","2509_Jumpboard","2603_Core Flow"],"2026-03",["GR"]),
  mk(3,"中央本部","Lucina東久留米","運営中",["済","済","済","済","済"],["済","済"],["3月","9月"],"2025/03/10",["済","済","済","済"],["Intermediate","2402_Back &Core","2409_Lowerbody","2503_Waist Shape","2509_Jumpboard","2603_Core Flow"],"2026-03",["GR"]),
  mk(4,"中央本部","Hanakura行田店","運営中",["済","済","済","済","済"],["済","済"],["3月","9月"],"2025/03/10",["済","済","済","済"],["Intermediate","2402_Back &Core","2409_Lowerbody","2503_Waist Shape","2509_Jumpboard","2603_Core Flow"],"2026-03",["GR"]),
  mk(5,"中央本部","Lucina那覇新都心","運営中",["済","済","済","済","済"],["済","済"],["3月","9月"],"2025/03/24",["済","済","済","済"],["Intermediate","2403_Back &Core","2409_Lowerbody","2503_Waist Shape","2602_Jumpboard",""],"",["GR"]),
  mk(6,"中央本部","わらわら航空公園店","運営中",["済","済","済","済","済"],["済","済"],["3月","9月"],"2025/03/25",["済","済","済","済"],["2410_Intermediate","2403_Back &Core","2409_Lowerbody","2503_Waist Shape","2509_Jumpboard",""],"",["GR"]),

// ━━━ Data Init (Firebase) ━━━
let DATA=[];
let firebaseReady=false;

function migrateData(arr){
  if(!Array.isArray(arr))arr=Object.values(arr);
  arr.forEach(d=>{
    if(!d.programs)d.programs=["GR"];
    if(d.bisaishin===undefined)d.bisaishin="";
    if(d.contactPerson===undefined)d.contactPerson="";
    if(d.contactEmail===undefined)d.contactEmail="";
    if(d.contactAddress===undefined)d.contactAddress="";
    if(d.contactPhone===undefined)d.contactPhone="";
  });
  return arr;
}

function loadData(callback){
  fetch(FB_URL+".json").then(r=>r.json()).then(saved=>{
    if(saved){
      DATA=migrateData(Array.isArray(saved)?saved:Object.values(saved));
      DEFAULT_DATA.forEach(dd=>{if(!DATA.find(d=>d.id===dd.id))DATA.push(JSON.parse(JSON.stringify(dd)));});
    }else{
      DATA=JSON.parse(JSON.stringify(DEFAULT_DATA));
      fetch(FB_URL+".json",{method:"PUT",body:JSON.stringify(DATA),headers:{"Content-Type":"application/json"}});
    }
    firebaseReady=true;
    if(callback)callback();
    // 定期同期（10秒ごと）
    setInterval(syncFromServer,10000);
  }).catch(e=>{
    console.error("Firebase load error:",e);
    alert("データ読み込みに失敗しました。インターネット接続を確認してください。");
  });
}

function syncFromServer(){
  fetch(FB_URL+".json").then(r=>r.json()).then(saved=>{
    if(saved){
      DATA=migrateData(Array.isArray(saved)?saved:Object.values(saved));
      if(firebaseReady)render();
    }
  }).catch(()=>{});
}

function save(){
  fetch(FB_URL+".json",{method:"PUT",body:JSON.stringify(DATA),headers:{"Content-Type":"application/json"}}).then(()=>{
    updateSaveIndicator();
  }).catch(e=>console.error("Save error:",e));
}

function updateSaveIndicator(){
  const el=document.getElementById('save-indicator');
  if(el){el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
}
let VIEW="matrix";

// ━━━ Auth ━━━
function tryLogin(){
  const pw=document.getElementById("pw-input").value;
  if(pw===ADMIN_PASSWORD){
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    loadData(()=>{render();});
  }
  else{const el=document.getElementById("pw-error");el.textContent="パスワードが正しくありません";document.getElementById("pw-input").style.borderColor="var(--red)";setTimeout(()=>{el.textContent="";document.getElementById("pw-input").style.borderColor="var(--gray200)";},2000);}
}
function logout(){document.getElementById("app").classList.add("hidden");document.getElementById("login").classList.remove("hidden");document.getElementById("pw-input").value="";}

// ━━━ Filter ━━━
function getFiltered(){
  const fa=document.getElementById("f-area").value,fs=document.getElementById("f-status").value,fp=document.getElementById("f-program").value,q=(document.getElementById("f-search").value||"").toLowerCase();
  return DATA.filter(s=>{
    if(fa&&s.area!==fa)return false;
    if(fs&&s.status!==fs)return false;
    if(fp==="gr"&&!hasGR(s))return false;
    if(fp==="bisai"&&!hasBisai(s))return false;
    if(fp==="both"&&!(hasGR(s)&&hasBisai(s)))return false;
    if(q&&!s.storeName.toLowerCase().includes(q)&&!s.area.includes(q))return false;
    return true;
  });
}

function switchView(v){
  VIEW=v;
  document.querySelectorAll(".nav-pill").forEach(b=>{b.classList.toggle("active",b.id==="nav-"+v);});
  document.getElementById("search-wrap").classList.toggle("hidden",v!=="list");
  document.getElementById("btn-add").classList.toggle("hidden",v!=="list");
  render();
}

// ━━━ RENDER: Skill-Up ━━━
function renderSkillUp(){
  const f=getFiltered().filter(s=>hasGR(s));

  const grTotal=DATA.filter(s=>hasGR(s)).length;
  let h=`<div class="flex" style="margin-bottom:24px;gap:16px">
    <div class="stat-card" style="--c:var(--accent)"><div style="position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent);border-radius:4px 0 0 4px"></div><div style="font-size:12px;color:var(--gray500);font-weight:600">GR 10種修了</div><div style="font-size:32px;font-weight:800;color:var(--accent);margin:4px 0">${comp.length}</div><div style="font-size:11px;color:var(--gray400)">/ ${grTotal}店舗</div></div>
    <div class="stat-card"><div style="position:absolute;top:0;left:0;width:4px;height:100%;background:var(--gray300);border-radius:4px 0 0 4px"></div><div style="font-size:12px;color:var(--gray500);font-weight:600">未修了</div><div style="font-size:32px;font-weight:800;color:var(--gray400);margin:4px 0">${incomp.length}</div></div>
  </div>`;
  if(comp.length){h+=`<h3 style="font-size:16px;font-weight:800;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block"></span>スキルアップ研修スケジュール</h3>`;}

    h+=`<div class="card" style="margin-bottom:16px;${next&&schedSt(next)==="current"?"border:2px solid var(--accent);box-shadow:0 4px 20px rgba(124,58,237,.15)":""}">

        <div class="flex" style="gap:12px"><span style="font-weight:800;font-size:16px;color:var(--primary);cursor:pointer" onclick="openDetail(${st.id})">${esc(st.storeName)}</span><span class="badge" style="background:${A_COL[st.area]}">${st.area}</span><span class="badge" style="background:${S_COL[st.status]}">${st.status}</span>${pgmBadges(st)}</div>
        <div class="flex" style="gap:12px"><span style="font-size:12px;color:var(--gray500)">修了: <strong style="color:var(--accent)">${fmtYM(c)}</strong></span>${next?`<span class="badge" style="background:var(--accent);font-size:12px;padding:5px 14px">次回 ${next.year}年${next.month}月</span>`:""}</div>
      </div>
      <div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:4px">`;
    sc.forEach(s=>{const sst=schedSt(s);const isCur=sst==="current";const isP=sst==="past";
      h+=`<div style="flex:0 0 auto;min-width:100px;padding:12px 14px;border-radius:14px;text-align:center;position:relative;transition:all .2s;
        background:${isCur?"linear-gradient(135deg,#7c3aed,#a78bfa)":isP?"var(--accent-light)":"#fff"};
        border:${isCur?"none":isP?"1.5px solid #ddd6fe":"1.5px solid #e9d5ff"};
        box-shadow:${isCur?"0 6px 20px rgba(124,58,237,.35)":"var(--shadow-sm)"}"
        onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='none'">
        ${isCur?`<div style="position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:2px 10px;border-radius:10px" class="pulse">NOW</div>`:""}
        <div style="font-size:10px;color:${isCur?"rgba(255,255,255,.7)":"var(--gray400)"}">第${s.idx}回</div>
        <div style="font-size:22px;font-weight:800;color:${isCur?"#fff":isP?"#a78bfa":"var(--accent)"};margin:4px 0">${s.month}月</div>
        <div style="font-size:11px;font-weight:600;color:${isCur?"rgba(255,255,255,.8)":"var(--gray500)"}">${s.year}</div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  if(incomp.length){
    h+=`<h3 style="font-size:16px;font-weight:800;color:var(--gray400);margin:28px 0 14px;display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;border-radius:50%;background:var(--gray300);display:inline-block"></span>未修了店舗 (GR)</h3>
    <div class="card" style="padding:0;overflow:hidden"><table style="font-size:13px"><thead><tr style="background:var(--gray50)"><th class="th">店舗名</th><th class="th">エリア</th><th class="th">種別</th><th class="th" style="text-align:center">導入済</th><th class="th" style="text-align:center">残り</th><th class="th">未導入プログラム</th></tr></thead><tbody>`;
    incomp.forEach(st=>{const done=ALL_P.filter(p=>isIn(st[p.key])).length;const miss=ALL_P.filter(p=>!isIn(st[p.key]));
      h+=`<tr><td class="td" style="font-weight:700;cursor:pointer;color:var(--primary)" onclick="openDetail(${st.id})">${esc(st.storeName)}</td><td class="td"><span class="badge" style="background:${A_COL[st.area]}">${st.area}</span></td><td class="td">${pgmBadges(st)}</td><td class="td" style="text-align:center;font-weight:700">${done}/10</td><td class="td" style="text-align:center"><span style="font-weight:800;color:var(--yellow);font-size:16px">${10-done}</span></td>
      <td class="td"><div class="flex" style="gap:4px">${miss.map(p=>`<span style="background:${p.color}12;color:${p.color};padding:3px 8px;border-radius:8px;font-size:10px;font-weight:700;border:1px solid ${p.color}25">${esc(p.label.replace(/^[①-⑥]/,""))}</span>`).join("")}</div></td></tr>`;
    });
    h+=`</tbody></table></div>`;
  }

}

      <td class="td"><span class="badge" style="background:${S_COL[st.status]}">${st.status}</span></td>
      <td class="td" style="text-align:center">${hasGR(st)?`<div class="flex" style="justify-content:center;gap:8px"><div class="bar-bg" style="width:50px;height:6px"><div class="bar-fill" style="width:${pct}%;background:${pc}"></div></div><span style="font-size:12px;font-weight:700;color:${pc}">${done}/10</span></div>`:`<span style="color:var(--gray300)">ー</span>`}</td>
      <td class="td" style="text-align:center">${bisaiSt}</td>

    </div></div>`;
  }

  h+=`<div style="text-align:right;margin-top:8px"><button class="btn btn-ghost" onclick="closeModal()">閉じる</button></div>`;

    <div style="font-size:13px;font-weight:800;color:var(--gray700);margin-bottom:10px">導入プログラム</div>
    <div class="flex" style="gap:24px">
      <label class="toggle-label"><input type="checkbox" id="chk-gr" ${hasG?"checked":""} onchange="toggleProgramSection()"> <span class="pgm-badge pgm-gr" style="font-size:12px;padding:4px 14px">GR（グループリフォーマー）</span></label>
      <label class="toggle-label"><input type="checkbox" id="chk-bisai" ${hasB?"checked":""} onchange="toggleProgramSection()"> <span class="pgm-badge pgm-bisai" style="font-size:12px;padding:4px 14px">美彩心</span></label>
    </div>
  </div>

  <!-- GR Section -->
  <div id="form-gr" ${hasG?"":' style="display:none"'}>
    <div style="background:linear-gradient(135deg,#eff6ff,#f8fafc);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;border:2px solid #bfdbfe">
      <div class="flex" style="margin-bottom:14px"><span class="pgm-badge pgm-gr" style="font-size:13px;padding:4px 16px">GR プログラム設定</span></div>
      <div class="grid3">
        <div class="form-field"><label>更新月①</label><input name="renewalMonth1" value="${esc(st.renewalMonth1)}"></div>
        <div class="form-field"><label>更新月②</label><input name="renewalMonth2" value="${esc(st.renewalMonth2)}"></div>
        <div class="form-field"><label>研修開催日</label><input name="trainingHistory" value="${esc(st.trainingHistory)}"></div>
      </div>
      <div style="background:#fff;border-radius:var(--radius);padding:16px;margin:10px 0;border:1.5px solid #e9d5ff">
        <div class="flex" style="gap:16px;align-items:flex-start">
          <div style="flex:0 0 280px">
            <label style="display:block;font-size:14px;font-weight:800;color:var(--accent);margin-bottom:8px">10種修了月</label>
            <div style="font-size:11px;color:var(--gray400);margin-bottom:8px">スキルアップ研修の起算月になります</div>
            <input type="month" name="completionDate" value="${st.completionDate}" style="width:100%;padding:12px 16px;border-radius:12px;border:2px solid #d8b4fe;font-size:16px;font-weight:700;color:var(--accent);cursor:pointer;background:#fff;box-sizing:border-box" oninput="updatePreview(this.value)">
          </div>
          <div style="flex:1;padding-top:28px" id="sched-preview"></div>
        </div>
      </div>
      <h3 style="font-size:14px;font-weight:800;color:var(--gray700);margin:10px 0 10px;display:flex;align-items:center;gap:8px"><span style="width:6px;height:6px;border-radius:50%;background:var(--gray500);display:inline-block"></span>GR 書類状況</h3>
      <div class="grid3">${DOCS_GR.map(d=>`<div class="form-field"><label>${d.l}</label><select name="${d.k}"><option value="">--</option><option ${st[d.k]==="済"?"selected":""}>済</option><option ${st[d.k]==="？"?"selected":""}>?</option></select></div>`).join("")}</div>
      <h3 style="font-size:14px;font-weight:800;color:var(--teal);margin:8px 0 10px;display:flex;align-items:center;gap:8px"><span style="width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block"></span>初級（4種）</h3>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0 16px">${BEG.map(p=>`<div class="form-field"><label>${p.label}</label><select name="${p.key}"><option value="">--</option><option ${st[p.key]==="済"?"selected":""}>済</option></select></div>`).join("")}</div>
      <h3 style="font-size:14px;font-weight:800;color:var(--navy);margin:8px 0 10px;display:flex;align-items:center;gap:8px"><span style="width:6px;height:6px;border-radius:50%;background:var(--navy);display:inline-block"></span>中級（6種）</h3>
      <div class="grid3">${MID.map(p=>`<div class="form-field"><label>${esc(p.label)}</label><input name="${p.key}" value="${esc(st[p.key])}"></div>`).join("")}</div>
      <div class="grid2" style="margin-top:8px">
        <div class="form-field"><label>初回養成スケジュール</label><input name="trainingSchedule" value="${esc(st.trainingSchedule)}"></div>
        <div class="form-field"><label>養成申込書</label><select name="trainingApplication"><option value="">--</option><option ${st.trainingApplication==="済"?"selected":""}>済</option></select></div>
      </div>
    </div>
  </div>

  <!-- 美彩心 Section -->
  <div id="form-bisai" ${hasB?"":' style="display:none"'}>
    <div style="background:linear-gradient(135deg,#fdf2f8,#fce7f3);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;border:2px solid #f9a8d4">
      <div class="flex" style="margin-bottom:14px"><span class="pgm-badge pgm-bisai" style="font-size:13px;padding:4px 16px">美彩心 プログラム設定</span></div>
      <div class="grid3">
        <div class="form-field"><label>美彩心 導入状況</label><input name="bisaishin" value="${esc(st.bisaishin)}" placeholder="済 / 予定 など"></div>
        <div class="form-field"><label>更新月①</label><input name="b_renewalMonth1" value="${esc(st.b_renewalMonth1||"")}"></div>
        <div class="form-field"><label>更新月②</label><input name="b_renewalMonth2" value="${esc(st.b_renewalMonth2||"")}"></div>
      </div>
      <div class="grid2" style="margin-top:4px">
        <div class="form-field"><label>養成スケジュール</label><input name="b_trainingSchedule" value="${esc(st.b_trainingSchedule||"")}"></div>
        <div class="form-field"><label>研修開催日</label><input name="b_trainingHistory" value="${esc(st.b_trainingHistory||"")}"></div>
      </div>
      <h3 style="font-size:14px;font-weight:800;color:var(--pink-dark);margin:10px 0 10px;display:flex;align-items:center;gap:8px"><span style="width:6px;height:6px;border-radius:50%;background:var(--pink);display:inline-block"></span>美彩心 書類状況</h3>
      <div class="grid3">${DOCS_BISAI.map(d=>`<div class="form-field"><label>${d.l}</label><select name="${d.k}"><option value="">--</option><option ${(st[d.k]||"")==="済"?"selected":""}>済</option><option ${(st[d.k]||"")==="？"?"selected":""}>?</option></select></div>`).join("")}</div>
    </div>
  </div>

  <div class="flex" style="justify-content:flex-end;margin-top:20px;gap:10px">
    <button type="button" class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
    <button type="button" class="btn btn-primary" style="padding:10px 28px;font-size:14px" onclick="saveForm(${st.id},${isNew})">${isNew?"登録する":"保存する"}</button>
  </div></form>`;
  showModal(h);
  if(st.completionDate) updatePreview(st.completionDate);
}

function toggleProgramSection(){
  document.getElementById("form-gr").style.display=document.getElementById("chk-gr").checked?"":"none";
  document.getElementById("form-bisai").style.display=document.getElementById("chk-bisai").checked?"":"none";
}

function updatePreview(val){
  const el=document.getElementById("sched-preview");if(!el)return;
  const c=parseCD(val);
  if(!c){el.innerHTML=`<div style="font-size:12px;color:var(--gray400)">修了月を選択すると研修予定が表示されます</div>`;return;}
  el.innerHTML=`<div style="font-size:11px;color:var(--gray500);margin-bottom:6px;font-weight:700">スキルアップ研修予定</div><div class="flex" style="gap:6px">${getSched(c,4).map(s=>`<div style="background:#fff;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;color:var(--accent);border:1.5px solid #e9d5ff;box-shadow:var(--shadow-sm)">第${s.idx}回 ${s.year}/${s.month}月</div>`).join("")}</div>`;
}

function saveForm(id,isNew){
  const fd=new FormData(document.getElementById("edit-form"));const obj={};
  fd.forEach((v,k)=>obj[k]=v);
  // Build programs array from checkboxes
  const progs=[];
  if(document.getElementById("chk-gr").checked)progs.push("GR");
  if(document.getElementById("chk-bisai").checked)progs.push("美彩心");
  obj.programs=progs;
  if(isNew){obj.id=Math.max(...DATA.map(d=>d.id),0)+1;DATA.push(obj);}
  else{const i=DATA.findIndex(d=>d.id===id);if(i>=0)DATA[i]={...DATA[i],...obj};}
  save();closeModal();render();
}

function confirmDel(id){
  const st=DATA.find(d=>d.id===id);if(!st)return;
  showModal(`<div style="text-align:center;padding:20px 0">
    <div style="width:56px;height:56px;border-radius:50%;background:var(--red-bg);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:24px">&#9888;</div>
    <h3 style="font-size:18px;font-weight:800;margin-bottom:8px">削除確認</h3>
    <p style="color:var(--gray500);margin-bottom:24px">「${esc(st.storeName)}」を削除しますか？<br><span style="font-size:12px;color:var(--gray400)">この操作は取り消せません</span></p>
    <div class="flex" style="justify-content:center;gap:10px">
      <button class="btn btn-ghost" style="padding:10px 24px" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-danger" style="padding:10px 24px" onclick="doDelete(${id})">削除する</button>
    </div></div>`);
}
function doDelete(id){DATA.splice(DATA.findIndex(d=>d.id===id),1);save();closeModal();render();}

function showModal(html){document.getElementById("modal-body").innerHTML=html;document.getElementById("modal-overlay").classList.add("active");}
function closeModal(){document.getElementById("modal-overlay").classList.remove("active");}
</script>
</body>
</html>
