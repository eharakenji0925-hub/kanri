<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>axiscore X Series</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C4A45A;--gold-lt:#D4B86A;
  --dark:#1A1A1A;--cream:#F5F0E8;--cream2:#EDE8DF;
  --purple:#2D0A8C;--purple-lt:#F0ECFF;--purple2:#E4DFFF;--purple-mid:#4A1BD4;
  --panel-w:480px;
}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:#111;color:#fff;min-height:100vh}

/* ─ LOGIN ─ */
#login-screen{
  position:fixed;inset:0;z-index:2000;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0e0e0e 60%,#1a0a40 100%);
}
.lb{width:340px;padding:48px 40px;background:rgba(255,255,255,.04);border:1px solid rgba(196,164,90,.3);border-radius:4px;text-align:center}
.lb h1{font-size:26px;letter-spacing:8px;color:var(--gold);font-weight:300;margin-bottom:6px}
.lb sub{font-size:10px;letter-spacing:4px;color:rgba(255,255,255,.35);display:block;margin-bottom:36px}
.lb input{width:100%;padding:13px 16px;margin-bottom:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:2px;color:#fff;font-size:14px;letter-spacing:2px;outline:none;text-align:center}
.lb input:focus{border-color:var(--gold)}
.lb button{width:100%;padding:13px;background:var(--gold);border:none;border-radius:2px;color:#111;font-size:12px;letter-spacing:4px;font-weight:700;cursor:pointer}
.lb button:hover{background:var(--gold-lt)}
.lb-err{color:#ff6b6b;font-size:11px;margin-top:10px;height:14px}
.lb-loading{color:rgba(255,255,255,.5);font-size:11px;margin-top:10px;height:14px}

/* ─ CATALOG ─ */
#catalog{display:none}

.c-head{position:sticky;top:0;z-index:100;height:56px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.1)}
.mode-d .c-head{background:#1a1a1a}
.mode-f .c-head{background:var(--purple)}
.mode-a .c-head{background:#0d0d0d}
.c-brand{font-size:16px;letter-spacing:5px;color:var(--gold);font-weight:300}
#logout-btn{padding:5px 14px;background:transparent;border:1px solid rgba(255,255,255,.3);border-radius:2px;color:rgba(255,255,255,.6);font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .2s}
#logout-btn:hover{border-color:rgba(255,255,255,.7);color:#fff}
.c-badge{padding:3px 14px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:2px}
.mode-d .c-badge{background:var(--gold);color:#111}
.mode-f .c-badge{background:#7B3FC4;color:#fff}
.mode-a .c-badge{background:linear-gradient(90deg,var(--gold),#7B3FC4);color:#fff}

.c-nav{display:flex;padding:0 28px;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.07)}
.mode-d .c-nav{background:#111}
.mode-f .c-nav{background:#1a0050}
.mode-a .c-nav{background:#0a0a0a}
.c-nav a{padding:13px 18px;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.45);text-decoration:none;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.c-nav a:hover{color:var(--gold);border-bottom-color:var(--gold)}

.s-hd{padding:72px 40px 52px;display:flex;align-items:flex-end;gap:20px}
.mode-d .s-hd{background:var(--dark)}
.mode-f .s-hd{background:var(--purple)}
.mode-a .s-hd{background:#0d0d0d}
.s-num{font-size:88px;font-weight:700;line-height:1;color:var(--gold);opacity:.55}
.s-en{font-size:44px;font-weight:300;letter-spacing:4px;color:#fff;line-height:1}
.s-jp{font-size:14px;letter-spacing:6px;color:rgba(255,255,255,.45);margin-top:7px}

/* product card */
.p-card{display:grid;grid-template-columns:1fr 1fr;min-height:400px;border-bottom:1px solid rgba(0,0,0,.12)}
.mode-d .p-card:nth-child(odd){background:var(--cream)}
.mode-d .p-card:nth-child(even){background:var(--cream2)}
.mode-f .p-card:nth-child(odd){background:var(--purple-lt)}
.mode-f .p-card:nth-child(even){background:var(--purple2)}
.mode-a .p-card:nth-child(odd){background:#f8f6f2}
.mode-a .p-card:nth-child(even){background:#ede8df}

.p-img-wrap{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.mode-d .p-img-wrap{background:#e6e0d5}
.mode-f .p-img-wrap{background:#d8d2f5}
.mode-a .p-img-wrap{background:#e6e0d5}
.p-main-img{width:100%;height:100%;object-fit:contain;padding:28px}
.p-thumbs{position:absolute;bottom:10px;right:10px;display:flex;gap:5px}
.p-thumb{width:48px;height:48px;object-fit:cover;border:2px solid rgba(255,255,255,.7);border-radius:2px;cursor:pointer;transition:border-color .2s}
.p-thumb:hover{border-color:var(--gold)}

.p-info{padding:36px;display:flex;flex-direction:column;color:#1a1a1a}
.p-id{font-size:10px;letter-spacing:4px;font-weight:700;color:var(--gold);margin-bottom:3px}
.p-nen{font-size:20px;font-weight:700;letter-spacing:1px;margin-bottom:3px}
.p-njp{font-size:12px;color:#666;margin-bottom:6px}
.p-desc{font-size:12px;color:#777;border-top:1px solid rgba(0,0,0,.1);padding-top:10px;margin-bottom:14px}

.price-single{display:flex;align-items:baseline;gap:6px;margin-bottom:16px}
.pv{font-size:48px;font-weight:700;color:var(--gold);line-height:1}
.pu{font-size:12px;color:#aaa;align-self:flex-end;margin-bottom:5px}
.price-dual{display:flex;gap:16px;margin-bottom:16px}
.pd-col{flex:1;padding:10px 12px;background:rgba(0,0,0,.05);border-radius:3px;text-align:center}
.pd-lbl{font-size:9px;letter-spacing:1px;color:#999;display:block;margin-bottom:3px}
.pd-v{font-size:28px;font-weight:700;line-height:1;color:var(--gold)}
.pd-col.col2 .pd-v{color:var(--purple-mid)}

.spec-tbl{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:11px}
.spec-tbl td{padding:4px 0;border-bottom:1px solid rgba(0,0,0,.07)}
.spec-tbl td:first-child{color:#999;width:80px;font-size:10px}
.spec-tbl td:last-child{font-weight:600;color:#1a1a1a}

.opts{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.opt{padding:4px 11px;font-size:10px;font-weight:600;border-radius:20px;border:1px solid rgba(0,0,0,.13);color:#555;background:rgba(0,0,0,.03)}
.opt.na{color:#ccc;border-color:#e5e5e5}
.spr{font-size:10px;color:#777;padding-top:8px;border-top:1px solid rgba(0,0,0,.07)}
.spr-lbl{font-size:9px;letter-spacing:2px;color:#bbb;margin-bottom:2px}

/* accessories */
.acc-sec{padding:36px}
.mode-d .acc-sec{background:var(--cream)}
.mode-f .acc-sec{background:var(--purple-lt)}
.mode-a .acc-sec{background:#f8f6f2}
.acc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(188px,1fr));gap:16px;margin-top:20px}
.acc-card{background:#fff;border-radius:3px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.mode-f .acc-card{background:rgba(74,27,212,.05);border:1px solid rgba(74,27,212,.1)}
.acc-img{width:100%;height:130px;object-fit:contain;padding:14px;background:#fafafa}
.acc-body{padding:12px}
.acc-name{font-size:12px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.acc-spec{font-size:10px;color:#aaa;margin-bottom:6px}
.acc-price{font-size:18px;font-weight:700;color:var(--gold)}
.acc-dual{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
.ad1{font-size:15px;color:var(--gold)}
.ad2{font-size:15px;color:var(--purple-mid)}
.ad-lbl{font-size:8px;color:#bbb;display:block}

.c-foot{padding:40px;text-align:center;font-size:10px;letter-spacing:4px;color:rgba(255,255,255,.25)}
.mode-d .c-foot{background:#111}
.mode-f .c-foot{background:#0d0020}
.mode-a .c-foot{background:#050505}

/* ─ ADMIN PANEL ─ */
#admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500}
#admin-overlay.open{display:block}
#admin-panel{
  position:fixed;top:0;right:-520px;width:var(--panel-w);height:100vh;
  background:#fff;z-index:501;overflow-y:auto;
  transition:right .3s ease;display:flex;flex-direction:column;
  box-shadow:-4px 0 24px rgba(0,0,0,.3);
}
#admin-panel.open{right:0}
.ap-head{padding:20px 24px;background:#1a1a1a;color:#fff;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.ap-head h2{font-size:14px;letter-spacing:3px;color:var(--gold)}
.ap-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:22px;cursor:pointer}
.ap-close:hover{color:#fff}
.ap-body{flex:1;padding:20px 24px;background:#f8f7f5}

.tok-box{background:#fff;border-radius:4px;padding:16px;margin-bottom:20px;border:1px solid #e8e5e0}
.tok-box label{font-size:10px;letter-spacing:2px;color:#999;display:block;margin-bottom:6px}
.tok-row{display:flex;gap:8px}
.tok-inp{flex:1;padding:9px 12px;border:1px solid #ddd;border-radius:3px;font-size:12px;font-family:monospace}
.btn-connect{padding:9px 16px;background:var(--gold);border:none;border-radius:3px;color:#111;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-connect:hover{background:var(--gold-lt)}
.tok-status{font-size:10px;margin-top:6px;padding:4px 8px;border-radius:2px}
.tok-status.ok{background:#d4edda;color:#155724}
.tok-status.ng{background:#f8d7da;color:#721c24}

.save-bar{padding:14px 24px;background:#1a1a1a;display:flex;gap:10px;align-items:center;justify-content:space-between;position:sticky;bottom:0;z-index:10}
.save-bar span{font-size:11px;color:rgba(255,255,255,.5)}
.btn-save{padding:10px 22px;background:var(--gold);border:none;border-radius:3px;color:#111;font-size:11px;font-weight:700;cursor:pointer}
.btn-save:disabled{background:#555;color:#999;cursor:default}
.btn-save:hover:not(:disabled){background:var(--gold-lt)}
.save-msg{font-size:10px;color:var(--gold)}

.ap-sec-title{font-size:10px;letter-spacing:3px;color:#999;padding:12px 0 6px;border-top:1px solid #e0dcd6;margin-top:8px;display:flex;align-items:center;justify-content:space-between}
.ap-sec-title:first-child{border-top:none;margin-top:0}
.btn-add{padding:3px 10px;background:var(--gold);border:none;border-radius:20px;color:#111;font-size:9px;font-weight:700;cursor:pointer}

.ap-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#fff;border-radius:3px;margin-bottom:5px;border:1px solid #e8e5e0;cursor:pointer;transition:border-color .15s}
.ap-row:hover{border-color:var(--gold)}
.ap-thumb{width:40px;height:40px;object-fit:cover;border-radius:2px;background:#eee;flex-shrink:0}
.ap-names{flex:1;min-width:0}
.ap-rid{font-size:9px;color:var(--gold);font-weight:700;letter-spacing:1px}
.ap-ren{font-size:11px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ap-rpr{font-size:10px;color:#aaa}
.ap-del{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:0 2px;flex-shrink:0}
.ap-del:hover{color:#e74c3c}

/* ─ EDITOR ─ */
#editor-panel{
  position:fixed;top:0;right:-560px;width:540px;height:100vh;
  background:#fff;z-index:502;overflow-y:auto;
  transition:right .3s ease;display:flex;flex-direction:column;
  box-shadow:-4px 0 24px rgba(0,0,0,.4);
}
#editor-panel.open{right:0}
.ep-head{padding:18px 22px;background:#1a1a1a;color:#fff;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.ep-back{background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;padding:0}
.ep-back:hover{color:#fff}
.ep-head h3{font-size:13px;letter-spacing:2px;color:var(--gold);flex:1}
.ep-body{flex:1;padding:22px}

.f-group{margin-bottom:16px}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f-lbl{font-size:9px;letter-spacing:2px;color:#999;display:block;margin-bottom:5px}
.f-inp,.f-sel,.f-ta{width:100%;padding:9px 11px;border:1px solid #ddd;border-radius:3px;font-size:12px;font-family:inherit;color:#1a1a1a;background:#fff;transition:border-color .15s}
.f-inp:focus,.f-sel:focus,.f-ta:focus{outline:none;border-color:var(--gold)}
.f-ta{resize:vertical;min-height:64px}
.f-div{border:none;border-top:1px solid #e8e5e0;margin:18px 0}
.f-sec{font-size:10px;letter-spacing:3px;color:#aaa;margin-bottom:12px}

/* factory: p2フィールドのみ強調 */
.field-factory{border-left:3px solid var(--purple-mid)!important;padding-left:8px}

.photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.photo-item{position:relative;width:80px;height:80px}
.photo-item img{width:100%;height:100%;object-fit:cover;border-radius:3px;border:1px solid #e0e0e0}
.photo-del{position:absolute;top:-5px;right:-5px;width:18px;height:18px;background:#e74c3c;border:none;border-radius:50%;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-add{width:80px;height:80px;border:2px dashed #ccc;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#bbb;font-size:10px;gap:4px;background:none;transition:border-color .15s}
.photo-add:hover{border-color:var(--gold);color:var(--gold)}
#photo-file-input{display:none}

.ep-foot{padding:14px 22px;background:#f8f7f5;border-top:1px solid #e8e5e0;display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0}
.btn-cancel{padding:10px 20px;background:#e8e5e0;border:none;border-radius:3px;font-size:11px;cursor:pointer;color:#555}
.btn-apply{padding:10px 22px;background:var(--gold);border:none;border-radius:3px;color:#111;font-size:11px;font-weight:700;cursor:pointer}
.btn-apply:hover{background:var(--gold-lt)}

#admin-fab{display:none;position:fixed;bottom:24px;right:24px;z-index:400;width:52px;height:52px;background:var(--gold);border:none;border-radius:50%;color:#111;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.35);transition:transform .2s;align-items:center;justify-content:center}
#admin-fab:hover{transform:scale(1.08)}
#admin-fab.show{display:flex}
.dirty-dot{width:8px;height:8px;background:#e74c3c;border-radius:50%;display:inline-block;margin-left:6px}

/* 価格未設定バッジ */
.badge-unset{
  display:inline-block;padding:3px 10px;
  background:#e74c3c;color:#fff;
  font-size:10px;font-weight:700;letter-spacing:1px;border-radius:2px;
  margin-bottom:10px;
}
.badge-unset-admin{
  display:inline-block;padding:2px 8px;
  background:#e74c3c;color:#fff;
  font-size:9px;font-weight:700;border-radius:2px;margin-left:6px;
  vertical-align:middle;
}

/* permission notice */
.perm-note{
  background:rgba(74,27,212,.08);border:1px solid rgba(74,27,212,.2);
  border-radius:3px;padding:10px 14px;margin-bottom:16px;
  font-size:11px;color:var(--purple-mid);
}

/* ─ SEARCH BAR ─ */
.search-bar{padding:10px 28px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.07)}
.mode-d .search-bar{background:#111}.mode-f .search-bar{background:#1a0050}.mode-a .search-bar{background:#0a0a0a}
.search-wrap{position:relative;flex:1;max-width:420px}
.search-inp{width:100%;padding:8px 36px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:3px;color:#fff;font-size:13px;outline:none;transition:border-color .2s}
.search-inp:focus{border-color:var(--gold)}.search-inp::placeholder{color:rgba(255,255,255,.3)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);font-size:13px;pointer-events:none}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.4);font-size:16px;cursor:pointer;display:none;line-height:1;padding:0}
.search-clear.show{display:block}.search-clear:hover{color:#fff}
.search-count{font-size:11px;color:rgba(255,255,255,.35);white-space:nowrap}
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap}
.cat-tab{padding:5px 14px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);background:transparent;cursor:pointer;transition:all .2s;white-space:nowrap}
.cat-tab:hover{border-color:rgba(196,164,90,.5);color:rgba(196,164,90,.8)}.cat-tab.active{background:var(--gold);border-color:var(--gold);color:#111}
.no-results{padding:80px 40px;text-align:center;font-size:14px;color:rgba(255,255,255,.3);letter-spacing:2px;background:var(--dark)}
/* hover edit */
.p-card{position:relative}
.p-edit-hover{display:none;position:absolute;top:12px;right:12px;z-index:10;padding:6px 14px;background:var(--gold);border:none;border-radius:2px;color:#111;font-size:10px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.can-edit .p-card:hover .p-edit-hover{display:block}
/* toast */
#toast{position:fixed;bottom:84px;right:24px;z-index:9999;padding:12px 20px;border-radius:3px;font-size:12px;font-weight:600;letter-spacing:1px;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}#toast.ok{background:#27ae60;color:#fff}#toast.ng{background:#e74c3c;color:#fff}
/* admin collapsible */
.ap-cat-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 0 6px;border-top:1px solid #e0dcd6;margin-top:8px;cursor:pointer;user-select:none}
.ap-cat-hd:first-child{border-top:none;margin-top:0}
.ap-cat-left{display:flex;align-items:center;gap:8px}
.ap-cat-lbl{font-size:10px;letter-spacing:3px;color:#999}
.ap-cat-cnt{font-size:9px;background:#e8e5e0;color:#888;padding:1px 7px;border-radius:20px;font-weight:700}
.ap-cat-ico{color:#bbb;font-size:12px;transition:transform .2s}.ap-cat-ico.open{transform:rotate(180deg)}
.ap-cat-body{overflow:hidden;transition:max-height .25s ease}
.ap-unset{font-size:9px;color:#e74c3c;font-weight:700;background:rgba(231,76,60,.1);padding:1px 6px;border-radius:2px;display:inline-block;margin-left:4px}
/* logout btn */
#logout-btn{padding:5px 14px;background:transparent;border:1px solid rgba(255,255,255,.3);border-radius:2px;color:rgba(255,255,255,.6);font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .2s}
#logout-btn:hover{border-color:rgba(255,255,255,.7);color:#fff}
/* badge */
.badge-unset{display:inline-block;padding:3px 10px;background:#e74c3c;color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;border-radius:2px;margin-bottom:10px}

/* ─ 販売価格 (p3) ─ */
.p3-block{
  margin-top:12px;padding:12px;
  background:rgba(196,164,90,.08);border:1px solid rgba(196,164,90,.2);
  border-radius:3px;
}
.p3-lbl{font-size:9px;letter-spacing:2px;color:#888;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.p3-lbl span{font-size:9px;color:#aaa}
.p3-row{display:flex;align-items:center;gap:8px}
.p3-val{font-size:24px;font-weight:700;color:var(--gold);flex:1;cursor:pointer;min-height:32px;display:flex;align-items:center}
.p3-val.empty{font-size:13px;color:#bbb;font-weight:400;border-bottom:1px dashed #ccc;padding-bottom:2px}
.p3-inp{flex:1;padding:6px 10px;border:1px solid var(--gold);border-radius:2px;font-size:18px;font-weight:700;color:#1a1a1a;background:#fff;outline:none}
.p3-save{padding:6px 14px;background:var(--gold);border:none;border-radius:2px;color:#111;font-size:11px;font-weight:700;cursor:pointer}
.p3-save:hover{background:var(--gold-lt)}
.p3-clear{padding:6px 10px;background:#e8e5e0;border:none;border-radius:2px;color:#888;font-size:11px;cursor:pointer}
.p3-margin{font-size:11px;color:#27ae60;font-weight:600;margin-top:4px}
.p3-dual{display:flex;gap:16px}
.p3-col{flex:1}
.p3-sub{font-size:10px;color:#999;letter-spacing:1px}

<!-- LOGIN -->
<div id="login-screen">
  <div class="lb">
    <h1>AXISCORE</h1>
    <sub>X SERIES — PROFESSIONAL PILATES EQUIPMENT</sub>
    <input type="password" id="pw-inp" placeholder="パスワードを入力" autocomplete="off">
    <button onclick="doLogin()">入 室</button>
    <div class="lb-err" id="pw-err"></div>
    <div class="lb-loading" id="pw-loading"></div>
  </div>
</div>

<!-- CATALOG -->
<div id="catalog">
  <header class="c-head">
    <div class="c-brand">axiscore &nbsp; X Series</div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="c-badge" id="mode-badge"></div>
      <button id="logout-btn" onclick="doLogout()" title="ログアウト">ログアウト</button>
    </div>
  </header>
  <nav class="c-nav" id="c-nav"></nav>
  <div class="search-bar" id="search-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-inp" id="search-inp" type="text" placeholder="Search...">
      <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
    </div>
    <div class="cat-tabs" id="cat-tabs"></div>
    <span class="search-count" id="search-count"></span>
  </div>
  <main id="cat-main"></main>
  <footer class="c-foot">AXISCORE X Series — Professional Pilates Equipment</footer>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ADMIN FAB -->
<button id="admin-fab" onclick="openAdmin()" title="管理パネル">⚙</button>

<!-- OVERLAY -->
<div id="admin-overlay" onclick="closeAdmin()"></div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="ap-head">
    <h2 id="ap-title">ADMIN PANEL</h2>
    <button class="ap-close" onclick="closeAdmin()">✕</button>
  </div>
  <div class="ap-body" id="ap-body"></div>

    </div>
  </div>
</div>

<!-- EDITOR -->
<div id="editor-panel">
  <div class="ep-head">
    <button class="ep-back" onclick="closeEditor()">←</button>
    <h3 id="ep-title">編集</h3>
  </div>
  <div class="ep-body" id="ep-body"></div>
  <div class="ep-foot">
    <button class="btn-cancel" onclick="closeEditor()">${L('cancel')}</button>
    <button class="btn-apply" onclick="applyEdit()">${L('apply')}</button>

</div>

function L(key){
  if(!LANG || !LANG.ja) return String(key);
  var lang = (S && S.mode && MODE_INFO && MODE_INFO[S.mode]) ? (MODE_INFO[S.mode].lang || 'ja') : 'ja';
  var dict = LANG[lang] || LANG.ja || {};
  return dict[key] !== undefined ? dict[key] : String(key);
}

// ── LOGIN ──
async function doLogin(){
  const pw   = document.getElementById('pw-inp').value.trim();
  const err  = document.getElementById('pw-err');
  const load = document.getElementById('pw-loading');

  if(!PASSWORDS[pw]){
    err.textContent = 'パスワードが正しくありません';
    setTimeout(()=>err.textContent='', 2500);
    return;
  }

  S.mode = PASSWORDS[pw];
  const info = MODE_INFO[S.mode];
  load.textContent = 'データを読み込み中...';
  document.querySelector('.lb button').disabled = true;

  const ok = await fetchData(info.dataFile);
  load.textContent = '';
  document.querySelector('.lb button').disabled = false;

  if(!ok){
    err.textContent = 'データ読み込み失敗。ネットワークを確認してください。';
    return;
  }

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('catalog').style.display = 'block';
  document.body.className = 'mode-' + S.mode;
  document.getElementById('mode-badge').textContent = info.label;

  renderNav();
  renderCatalog();
  initSearch();
  applyLang();

  if(info.canEdit){
    document.getElementById('admin-fab').classList.add('show');
    document.getElementById('catalog').classList.add('can-edit');
  }
}

function applyLang(){
  document.getElementById('logout-btn').textContent = L('logout');
  document.getElementById('search-inp').placeholder = L('search');
  document.getElementById('admin-fab').title = L('admin');
  document.getElementById('btn-save').textContent = L('save');
  document.getElementById('btn-import-p3').style.display = (S.mode==='a') ? 'inline-block' : 'none';
  document.getElementById('save-status').textContent = L('disconnected');
  const ap = document.getElementById('ap-title');
  if(ap) ap.textContent = L('admin');
}
document.getElementById('pw-inp').addEventListener('keydown', e => {
  if(e.key === 'Enter') doLogin();
});

function doLogout(){
  if(S.dirty){
    if(!confirm(L('logoutDirty'))) return;
  } else {
    if(!confirm(L('logoutConfirm'))) return;
  }
  // 状態リセット
  S = { mode:null, token:null, data:null, dirty:false };
  // 画面リセット
  document.getElementById('catalog').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-inp').value = '';
  document.getElementById('pw-err').textContent = '';
  document.getElementById('cat-main').innerHTML = '';
  document.getElementById('admin-fab').classList.remove('show');
  document.body.className = '';
  // パネルを閉じる
  document.getElementById('admin-panel').classList.remove('open');
  document.getElementById('editor-panel').classList.remove('open');
  document.getElementById('admin-overlay').classList.remove('open');
}

// ── DATA FETCH ──
async function fetchData(fileKey){
  const fname = FILES[fileKey].name;
  try {
    const r = await fetch(RAW(fname) + '?t=' + Date.now());
    if(!r.ok) return false;
    S.data = await r.json();
    return true;
  } catch(e){ return false; }
}

async function getFileSha(fileKey){
  const fname = FILES[fileKey].name;
  if(!S.token) return false;
  try {
    const r = await fetch(API(fname), {
      headers:{ 'Authorization':'token '+S.token }
    });
    if(!r.ok) return false;
    const m = await r.json();
    FILES[fileKey].sha = m.sha;
    return true;
  } catch(e){ return false; }
}

function renderNav(){
  const nav = document.getElementById('c-nav');
  let h = '';
  S.data.sections.forEach(sec => {
    h += `<a href="#sec-${sec.num}">${sec.num} ${sec.en}</a>`;
  });
  h += `<a href="#sec-06">06 Accessories</a>`;
  nav.innerHTML = h;
}

function renderCatalog(){
  const main = document.getElementById('cat-main');
  let h = '';
  S.data.sections.forEach((sec, si) => {
    h += `<section id="sec-${sec.num}" data-sec="${si}">
      <div class="s-hd">
        <div class="s-num">${sec.num}</div>
        <div><div class="s-en">${sec.en}</div><div class="s-jp">${sec.jp}</div></div>
      </div>
      <div>${sec.products.map((p,pi) => renderCard(p, si, pi)).join('')}</div>
    </section>`;
  });
  h += renderAccessories();
  main.innerHTML = h;

  main.querySelectorAll('.p-thumb').forEach(t => {
    t.addEventListener('click', () => {
      t.closest('.p-img-wrap').querySelector('.p-main-img').src = t.src;
    });
  });
}

function renderCard(p, si, pi){
  const photos = (p.photos||[]).filter(Boolean);
  const mainP  = photos[0] || '';
  const extras = photos.slice(1);
  const info   = MODE_INFO[S.mode];

  // 価格表示
  const p1empty = !p.p1 || p.p1.trim() === '' || p.p1 === '—';
  const _si = si !== undefined ? si : '';
  const _pi = pi !== undefined ? pi : '';
  let priceH = '';
  // p3販売価格ブロック（共通ヘルパー）
  const fmtYen = n => { const num = parseInt(String(n).replace(/[^0-9]/g,'')); return isNaN(num) ? n : '¥'+num.toLocaleString(); };
  let p3H = '';
  if(p.p3 && String(p.p3).trim()){
    const p3v = String(p.p3).trim();
    const p3t = (p.p3tax && String(p.p3tax).trim()) ? String(p.p3tax).trim() : '';
    p3H = `<div class="p3-block">
      <div class="p3-lbl">販売価格</div>
      <div class="p3-dual">
        <div class="p3-col"><span class="p3-sub">税抜</span><div class="p3-val">${fmtYen(p3v)}</div></div>
        ${p3t ? `<div class="p3-col"><span class="p3-sub">税込</span><div class="p3-val">${fmtYen(p3t)}</div></div>` : ''}
      </div>
    </div>`;
  }
  let p4H = '';
  if(p.p4 && String(p.p4).trim()){
    const p4v = String(p.p4).trim();
    const p4t = (p.p4tax && String(p.p4tax).trim()) ? String(p.p4tax).trim() : '';
    const profitV = (p.p4profit && String(p.p4profit).trim()) ? String(p.p4profit).trim() : '';
    p4H = `<div class="p4-block">
      <div class="p4-lbl">代理店価格</div>
      <div class="p3-dual">
        <div class="p3-col"><span class="p3-sub">税抜</span><div class="p4-val">${fmtYen(p4v)}</div></div>
        ${p4t ? `<div class="p3-col"><span class="p3-sub">税込</span><div class="p4-val">${fmtYen(p4t)}</div></div>` : ''}
        ${(profitV && S.mode==='a') ? `<div class="p3-col"><span class="p3-sub">利益</span><div class="p4-profit">${fmtYen(profitV)}</div></div>` : ''}
      </div>
    </div>`;
  }

  if(S.mode === 'a'){
    // 江原管理: C(仕入れUSD) + 原価(紫) + F,G(代理店価格) + J,K(販売価格)
    priceH = (p1empty ? `<div class='badge-unset'>${L('priceUnsetMsg')}</div>` : '') +
      `<div class="price-dual">
        <div class="pd-col col1"><span class="pd-lbl">${L('wholesale')}</span><div class="pd-v">${p1empty ? '未設定' : p.p1}</div></div>
        <div class="pd-col col2"><span class="pd-lbl">${L('factory')}</span><div class="pd-v">${p.p2||'—'}</div></div>
      </div>` + p4H + p3H;
  } else if(S.mode === 'f'){
    // 工場: そのまま（p1+p2のみ）
    priceH = (p1empty ? `<div class='badge-unset'>${L('priceUnsetMsg')}</div>` : '') +
      `<div class="price-dual">
        <div class="pd-col col1"><span class="pd-lbl">${L('wholesale')}</span><div class="pd-v">${p1empty ? '未設定' : p.p1}</div></div>
        <div class="pd-col col2"><span class="pd-lbl">${L('factory')}</span><div class="pd-v">${p.p2||'—'}</div></div>
      </div>`;
  } else {
    // 大丸: C(仕入れUSD) + F,G(代理店価格) + J,K(販売価格) — 利益なし、原価なし
    priceH = p1empty
      ? '<div class="badge-unset">⚠ 価格未設定</div>'
      : `<div class="price-single"><div class="pv">${p.p1}</div><div class="pu">USD</div></div>`;
    priceH += p4H + p3H;
  }

  // スペック
  const specs = [];
  if(p.size   && p.size!=='—')   specs.push(['SIZE',    p.size]);
  if(p.pack   && p.pack!=='—')   specs.push(['PACK',    p.pack]);
  if(p.weight && p.weight!=='—') specs.push([L('fldWt'), p.weight]);
  if(p.packW  && p.packW!=='—')  specs.push([L('fldPw'), p.packW]);
  if(p.height && p.height!=='—') specs.push([L('fldHt'),    p.height]);
  const specH = specs.length
    ? `<table class="spec-tbl">${specs.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}</table>`
    : '';

  // オプション（大丸はeva1/paint1、工場はeva2/paint2）
  const eva  = S.mode==='f' ? (p.eva2||'') : (p.eva1||'');
  const pnt  = S.mode==='f' ? (p.paint2||'') : (p.paint1||'');
  const optH = `<div class="opts">
    <span class="opt${eva.includes('N/A')?' na':''}">${eva}</span>
    <span class="opt${pnt.includes('N/A')?' na':''}">${pnt}</span>
  </div>`;

  const sprH = p.springs
    ? `<div class="spr"><div class="spr-lbl">SPRINGS</div>${p.springs}</div>` : '';

  const thumbsH = extras.length
    ? `<div class="p-thumbs">${photos.map(ph=>`<img class="p-thumb" src="${ph}" loading="lazy">`).join('')}</div>`
    : '';

  return `<div class="p-card" data-search="${(p.id+' '+p.nameEN+' '+(p.nameJP||'')+' '+(p.desc||'')).toLowerCase()}">
    ${MODE_INFO[S.mode].canEdit ? `<button class="p-edit-hover" onclick="openAdminAndEdit(${_si},${_pi})">${L('edit')}</button>` : ''}
    <div class="p-img-wrap">
      ${mainP
        ? `<img class="p-main-img" src="${mainP}" loading="lazy" alt="${p.nameEN}">`
        : '<div style="color:#bbb;font-size:11px">NO IMAGE</div>'}
      ${thumbsH}
    </div>
    <div class="p-info">
      <div class="p-id">${p.id}</div>
      <div class="p-nen">${p.nameEN}</div>
      <div class="p-njp">${p.nameJP||''}</div>
      <div class="p-desc">${p.desc||''}</div>
      ${priceH}${specH}${optH}${sprH}
      ${(S.mode==='a'||S.mode==='f') && p.memo ? `<div class="p-memo"><div class="p-memo-lbl">MEMO</div><div class="p-memo-txt">${p.memo.replace(/\n/g,'<br>')}</div></div>` : ''}
    </div>
  </div>`;
}

function renderAccessories(){
  const acc = S.data.accessories;
  const showBoth = S.mode==='f' || S.mode==='a';

  function accCard(item){
    let pH = '';
    if(showBoth){
      pH = `<div class="acc-dual">
        <div><span class="ad-lbl">仕入れ</span><span class="ad1">${item.p1}</span></div>
        <span style="color:#ddd">/</span>
        <div><span class="ad-lbl">原価</span><span class="ad2">${item.p2||'—'}</span></div>
      </div>`;
    } else {
      pH = `<div class="acc-price">${item.p1}<span style="font-size:10px;color:#aaa;margin-left:4px">USD</span></div>`;
      // アクセサリーにもp3販売価格を表示
      if(item.p3 && String(item.p3).trim()){
        const fmtYen = n => { const num = parseInt(String(n).replace(/[^0-9]/g,'')); return isNaN(num) ? n : '¥'+num.toLocaleString(); };
        const p3t = (item.p3tax && String(item.p3tax).trim()) ? String(item.p3tax).trim() : '';
        pH += `<div class="p3-block" style="margin-top:6px;padding:8px">
          <div class="p3-lbl">販売��格</div>
          <div class="p3-dual">
            <div class="p3-col"><span class="p3-sub">税抜</span><div class="p3-val" style="font-size:16px">${fmtYen(item.p3)}</div></div>
            ${p3t ? `<div class="p3-col"><span class="p3-sub">税込</span><div class="p3-val" style="font-size:16px">${fmtYen(p3t)}</div></div>` : ''}
          </div>
        </div>`;
      }
    }
    return `<div class="acc-card">
      ${item.photo
        ? `<img class="acc-img" src="${item.photo}" loading="lazy" alt="${item.name}">`
        : '<div class="acc-img" style="display:flex;align-items:center;justify-content:center;color:#ddd">—</div>'}
      <div class="acc-body">
        <div class="acc-name">${item.name}</div>
        ${item.spec ? `<div class="acc-spec">${item.spec}</div>` : ''}
        ${pH}
      </div>
    </div>`;
  }

  return `<section id="sec-06">
    <div class="s-hd">
      <div class="s-num">06</div>
      <div><div class="s-en">Accessories</div><div class="s-jp">アクセサリー</div></div>
    </div>
    <div class="acc-sec">
      <div class="acc-grid">${acc.small.map(accCard).join('')}</div>
      <div class="acc-grid" style="margin-top:24px">${acc.large.map(accCard).join('')}</div>
    </div>
  </section>`;
}

  });

  body.innerHTML = h;

  // イベント委譲（onclick属性の代わり）
  body.addEventListener('click', function(e){
    var el = e.target.closest('[data-action]');
    if(!el) return;
    var action = el.dataset.action;
    if(action === 'newProduct'){ e.stopPropagation(); newProduct(parseInt(el.dataset.si)); }
    else if(action === 'newAcc'){ e.stopPropagation(); newAcc(el.dataset.type); }
    else if(action === 'editProduct'){ editProduct(parseInt(el.dataset.si), parseInt(el.dataset.pi)); }
    else if(action === 'deleteProd'){ e.stopPropagation(); deleteProd(e, parseInt(el.dataset.si), parseInt(el.dataset.pi)); }
    else if(action === 'editAcc'){ editAcc(el.dataset.type, parseInt(el.dataset.ai)); }
    else if(action === 'deleteAcc'){ e.stopPropagation(); deleteAcc(e, el.dataset.type, parseInt(el.dataset.ai)); }
  });

  updateSaveUI();
}

async function connectGitHub(){

function updateSaveUI(){

  if(S.dirty){

    btn.disabled = false;

// ── SAVE TO GITHUB ──
// 工場: products_full.json のみ更新
// 江原管理者: products_full.json + products_daimaru.json（p2除去版）を両方更新
async function saveToGitHub(){
  if(!S.token){ alert('先にGitHubトークンを接続してください'); return; }

  const btn = document.getElementById('btn-save');
  const msg = document.getElementById('save-msg');
  btn.disabled = true;
  btn.textContent = '保存中...';

  // products_full.json を保存
  const fullKey = MODE_INFO[S.mode].dataFile; // 'full' or 'full'
  const ok1 = await commitFile('full', S.data);
  if(!ok1){
    btn.disabled = false;
    btn.textContent = 'GitHubに保存';
    return;
  }

  // 江原管理者の場合はdaimaru版も自動生成して保存
  if(S.mode === 'a'){
    const daimaru = stripP2(S.data);
    await commitFile('daimaru', daimaru);
  }

  S.dirty = false;
  msg.textContent = '✓ 保存完了';
  setTimeout(()=>msg.textContent='', 3000);
  btn.disabled = false;
  btn.textContent = 'GitHubに保存';
  updateSaveUI();
}

async function commitFile(fileKey, data){
  const fname = FILES[fileKey].name;
  if(!FILES[fileKey].sha) await getFileSha(fileKey);

  const jsonStr = JSON.stringify(data, null, 2);
  const encoded = btoa(unescape(encodeURIComponent(jsonStr)));
  const body = {
    message: `Update ${fname} [${new Date().toLocaleString('ja-JP')}]`,
    content: encoded,
    sha: FILES[fileKey].sha
  };

  try {
    const r = await fetch(API(fname), {
      method: 'PUT',
      headers: { 'Authorization':'token '+S.token, 'Content-Type':'application/json' },
      body: JSON.stringify(body)
    });
    if(r.ok){
      const result = await r.json();
      FILES[fileKey].sha = result.content.sha;
      return true;
    } else {
      const err = await r.json();
      alert(`保存失敗 (${fname}): ` + (err.message||r.status));
      return false;
    }
  } catch(e){ alert('ネットワークエラー: '+e.message); return false; }
}

// p2を除去してdaimaru版を生成
function stripP2(fullData){
  const d = JSON.parse(JSON.stringify(fullData));
  d.sections.forEach(sec => {
    sec.products.forEach(p => {
      delete p.p2; delete p.eva2; delete p.paint2; delete p.memo; delete p.p4profit;
    });
  });
  [...d.accessories.small, ...d.accessories.large].forEach(item => {
    delete item.p2;
  });
  return d;
}

function bindPhotoUpload(){

function fileToB64(file){
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.readAsDataURL(file);
  });
}

function esc(str){

function initSearch(){

  tabs.innerHTML = h;
  document.getElementById('search-inp').addEventListener('input', function(){
    document.getElementById('search-clear').classList.toggle('show', this.value.length > 0);
    applySearch(this.value.trim());
  });
}

function clearSearch(){
  document.getElementById('search-inp').value = '';
  document.getElementById('search-clear').classList.remove('show');
  applySearch('');
}

function filterCat(cat, btn){
  activeFilter = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  applySearch(document.getElementById('search-inp').value.trim());
}

function applySearch(q){
  const lower = q.toLowerCase();
  let count = 0;
  document.querySelectorAll('#cat-main section').forEach(sec => {
    const num = sec.id.replace('sec-','');
    const catOk = activeFilter === 'all' || activeFilter === num;
    if(!catOk){ sec.style.display='none'; return; }
    if(num === '06'){ sec.style.display=''; count++; return; }
    let vis = 0;
    sec.querySelectorAll('.p-card').forEach(card => {
      const match = !lower || (card.dataset.search||'').includes(lower);
      card.style.display = match ? '' : 'none';
      if(match) vis++;
    });
    sec.style.display = vis > 0 ? '' : 'none';
    if(vis > 0) count++;
  });
  document.getElementById('search-count').textContent = lower ? count + (S.mode==='f'?'件':'件') : '';
  let nr = document.getElementById('no-results');
  if(count === 0 && lower){
    if(!nr){ nr=document.createElement('div'); nr.id='no-results'; nr.className='no-results'; document.getElementById('cat-main').appendChild(nr); }
    nr.textContent = '"' + q + '" ' + L('noResult');
  } else if(nr) nr.remove();
}

function importP3FromExcel(){
  if(S.mode !== 'a'){ alert('管理者モードでのみ実行できます'); return; }
  var count = 0;
  S.data.sections.forEach(function(sec){
    sec.products.forEach(function(p){
      // IDまたは名前でマッチ
      var match = P3_IMPORT_MAP[p.id] || P3_IMPORT_MAP[p.nameEN] || P3_IMPORT_MAP[p.nameJP];
      if(match){
        p.p3 = match.p3;
        p.p3tax = match.p3tax;
        count++;
      }
    });
  });
  // アクセサリーにも適用
  ['small','large'].forEach(function(k){
    (S.data.accessories[k]||[]).forEach(function(item){
      var match = P3_IMPORT_MAP[item.name];
      if(match){
        item.p3 = match.p3;
        item.p3tax = match.p3tax;
        count++;
      }
    });
  });
  S.dirty = true;
  alert('販売価格を ' + count + ' 件の商品に反映しました。\n「GitHubに保存」を押して保存してください。');
  renderCatalog();
  renderAdminPanel();
}

// 代理店価格の税込を自動計算
function autoP4tax(){
  const inp = document.getElementById('e-p4');
  const out = document.getElementById('e-p4tax');
  if(!inp || !out) return;
  const v = parseFloat(inp.value.replace(/[^0-9.]/g,''));
  if(!isNaN(v) && v > 0){
    out.value = Math.round(v * 1.1);
  }
}

// 税抜入力時に税込を自動計算
function autoP3tax(){
  const inp = document.getElementById('e-p3');
  const out = document.getElementById('e-p3tax');
  if(!inp || !out) return;
  const v = parseFloat(inp.value.replace(/[^0-9.]/g,''));
  if(!isNaN(v) && v > 0){
    out.value = Math.round(v * 1.1);
  }
}
