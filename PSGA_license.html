<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PSGA資格更新管理 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
:root{
  --bg:#0a1220;
  --panel:#0f1a2e;
  --panel-2:#152542;
  --line:#1e3252;
  --line-soft:#162339;
  --ink:#e7ecf3;
  --ink-mute:#8fa3c0;
  --ink-dim:#5e7492;
  --accent:#4dd0e1;
  --accent-soft:rgba(77,208,225,.12);
  --gold:#d4a574;
  --ok:#4ade80;
  --warn:#fbbf24;
  --danger:#f87171;
  --paid-bg:rgba(74,222,128,.08);
  --expired-bg:rgba(248,113,113,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Noto Sans JP",system-ui,sans-serif;
  background:var(--bg);
  color:var(--ink);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 1200px 600px at 20% 0%,rgba(77,208,225,.06),transparent 60%),
    radial-gradient(ellipse 800px 500px at 100% 100%,rgba(212,165,116,.04),transparent 60%);
}

/* ========= LOGIN ========= */
#login{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
.login-card{
  width:min(92vw,420px);
  padding:48px 40px;
  background:linear-gradient(180deg,var(--panel),var(--bg));
  border:1px solid var(--line);
  border-radius:2px;
  text-align:center;
  position:relative;
}
.login-card::before{
  content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:40px;height:1px;background:var(--accent);
}
.login-brand{
  font-family:"Cormorant Garamond",serif;
  font-size:12px;letter-spacing:.4em;color:var(--accent);
  text-transform:uppercase;margin-bottom:8px;
}
.login-title{
  font-family:"Cormorant Garamond",serif;
  font-size:28px;font-weight:500;letter-spacing:.02em;
  margin-bottom:4px;
}
.login-sub{
  font-size:11px;color:var(--ink-mute);letter-spacing:.2em;margin-bottom:36px;
}
.login-card input{
  width:100%;padding:14px 16px;
  background:transparent;border:1px solid var(--line);border-radius:0;
  color:var(--ink);font-family:inherit;font-size:14px;
  text-align:center;letter-spacing:.1em;
  outline:none;transition:border .2s;
}
.login-card input:focus{border-color:var(--accent)}
.login-card button{
  width:100%;margin-top:16px;padding:14px;
  background:var(--accent);color:#0a1220;
  border:none;border-radius:0;cursor:pointer;
  font-family:inherit;font-size:12px;font-weight:600;
  letter-spacing:.3em;text-transform:uppercase;
  transition:background .2s;
}
.login-card button:hover{background:#66d9e8}
.login-err{color:var(--danger);font-size:11px;margin-top:12px;min-height:14px;letter-spacing:.05em}

/* ========= APP ========= */
#app{display:none;position:relative;z-index:1}
.header{
  padding:28px 32px 20px;
  border-bottom:1px solid var(--line-soft);
  display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;
}
.brand-line{display:flex;align-items:baseline;gap:16px}
.brand-mark{
  font-family:"Cormorant Garamond",serif;
  font-size:11px;letter-spacing:.4em;color:var(--accent);
  text-transform:uppercase;
}
.brand-title{
  font-family:"Cormorant Garamond",serif;
  font-size:26px;font-weight:500;letter-spacing:.01em;
}
.brand-sub{font-size:11px;color:var(--ink-mute);letter-spacing:.25em;margin-top:6px}
.header-right{display:flex;gap:8px;align-items:center}
.logout-btn{
  padding:8px 14px;background:transparent;border:1px solid var(--line);
  color:var(--ink-mute);font-family:inherit;font-size:11px;letter-spacing:.15em;
  cursor:pointer;border-radius:0;transition:all .2s;
}
.logout-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ========= ISSUES ========= */
.issues-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 12px;background:rgba(251,191,36,.08);
  border:1px solid rgba(251,191,36,.35);
  color:var(--warn);font-family:inherit;font-size:11px;letter-spacing:.1em;
  cursor:pointer;border-radius:0;transition:all .2s;
}
.issues-btn:hover{background:rgba(251,191,36,.15);border-color:var(--warn)}
.issues-btn svg{width:13px;height:13px}
.issues-btn span:not(.issues-count){letter-spacing:.1em}
.issues-count{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:18px;height:18px;padding:0 5px;
  background:var(--warn);color:#0a1220;
  font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:700;
  letter-spacing:0;border-radius:0;
}
.issues-btn.dismissed{opacity:.55}

.issues-panel{
  display:none;
  border-bottom:1px solid var(--line-soft);
  background:linear-gradient(180deg,rgba(251,191,36,.04),transparent);
}
.issues-panel.open{display:block;animation:slideDown .25s ease-out}
@keyframes slideDown{
  from{opacity:0;transform:translateY(-6px)}
  to{opacity:1;transform:translateY(0)}
}
.issues-head{
  padding:14px 32px 10px;
  display:flex;justify-content:space-between;align-items:center;
}
.issues-title{
  display:flex;align-items:center;gap:12px;
  font-size:13px;font-weight:600;color:var(--warn);
  letter-spacing:.08em;
}
.issues-accent{
  width:4px;height:14px;background:var(--warn);display:inline-block;
}
.issues-sub{
  font-size:10px;color:var(--ink-dim);font-weight:400;letter-spacing:.15em;
  margin-left:4px;
}
.issues-close{
  width:28px;height:28px;background:transparent;border:1px solid var(--line);
  color:var(--ink-mute);font-size:16px;line-height:1;cursor:pointer;
  border-radius:0;transition:all .2s;
}
.issues-close:hover{border-color:var(--warn);color:var(--warn)}
.issues-body{
  padding:4px 32px 18px;
  display:grid;gap:8px;
}
.issue-item{
  display:grid;grid-template-columns:140px 1fr auto;gap:16px;align-items:center;
  padding:10px 14px;background:var(--panel);border:1px solid var(--line-soft);
  font-size:12px;
}
.issue-tag{
  font-size:10px;letter-spacing:.1em;color:var(--warn);
  padding:3px 8px;border:1px solid rgba(251,191,36,.35);
  text-align:center;
}
.issue-tag.info{color:var(--accent);border-color:rgba(77,208,225,.35)}
.issue-text{color:var(--ink-mute);line-height:1.6}
.issue-text strong{color:var(--ink);font-weight:500}
.issue-text code{
  font-family:"JetBrains Mono",monospace;font-size:11px;
  padding:1px 5px;background:var(--bg);border:1px solid var(--line-soft);
  color:var(--accent);
}
.issue-action{
  padding:6px 10px;background:transparent;border:1px solid var(--line);
  color:var(--ink-mute);font-family:inherit;font-size:11px;letter-spacing:.1em;
  cursor:pointer;border-radius:0;transition:all .2s;white-space:nowrap;
}
.issue-action:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:780px){
  .issues-head{padding:12px 16px 8px}
  .issues-body{padding:4px 16px 14px}
  .issue-item{grid-template-columns:1fr;gap:8px}
  .issue-action{justify-self:start}
}

/* ========= STATS ========= */
.stats{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:1px;background:var(--line-soft);
  border-bottom:1px solid var(--line-soft);
}
.stat{
  padding:20px 24px;background:var(--bg);
  display:flex;flex-direction:column;gap:4px;
  cursor:pointer;transition:background .2s;
  position:relative;
}
.stat:hover{background:var(--panel)}
.stat.active{background:var(--panel)}
.stat.active::before{
  content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);
}
.stat-label{font-size:10px;color:var(--ink-mute);letter-spacing:.2em;text-transform:uppercase}
.stat-value{
  font-family:"Cormorant Garamond",serif;
  font-size:30px;font-weight:500;color:var(--ink);line-height:1;
}
.stat-value .unit{font-size:13px;color:var(--ink-mute);margin-left:4px;font-family:"Noto Sans JP",sans-serif}

/* ========= CONTROLS ========= */
.controls{
  padding:16px 32px;
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  border-bottom:1px solid var(--line-soft);
  background:var(--panel);
}
.search-wrap{position:relative;flex:1;min-width:240px;max-width:420px}
.search-wrap svg{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;color:var(--ink-dim);pointer-events:none;
}
.search-wrap input{
  width:100%;padding:9px 12px 9px 34px;
  background:var(--bg);border:1px solid var(--line);border-radius:0;
  color:var(--ink);font-family:inherit;font-size:13px;
  outline:none;transition:border .2s;
}
.search-wrap input:focus{border-color:var(--accent)}
.kana-bar{
  display:flex;gap:1px;background:var(--line-soft);
  border:1px solid var(--line);
}
.kana-bar button{
  min-width:28px;padding:6px 8px;
  background:var(--bg);border:none;
  color:var(--ink-mute);cursor:pointer;
  font-family:inherit;font-size:12px;
  transition:all .15s;
}
.kana-bar button:hover{background:var(--panel-2);color:var(--ink)}
.kana-bar button.active{background:var(--accent);color:#0a1220;font-weight:600}
select.filter-select{
  padding:9px 28px 9px 12px;background:var(--bg);border:1px solid var(--line);
  color:var(--ink);font-family:inherit;font-size:12px;border-radius:0;
  cursor:pointer;outline:none;
  appearance:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%238fa3c0' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
  background-repeat:no-repeat;background-position:right 10px center;
}
.btn{
  padding:9px 14px;background:transparent;border:1px solid var(--line);
  color:var(--ink);font-family:inherit;font-size:12px;letter-spacing:.1em;
  cursor:pointer;border-radius:0;transition:all .2s;
  display:inline-flex;align-items:center;gap:6px;
}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#0a1220;border-color:var(--accent);font-weight:600}
.btn.primary:hover{background:#66d9e8;color:#0a1220}
.btn.accent{background:rgba(212,165,116,.08);border-color:rgba(212,165,116,.5);color:var(--gold)}
.btn.accent:hover{background:rgba(212,165,116,.18);border-color:var(--gold);color:var(--gold)}
.btn svg{width:13px;height:13px}

/* ========= MODAL ========= */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:150;
  background:rgba(10,18,32,.82);backdrop-filter:blur(6px);
  align-items:flex-start;justify-content:center;padding:40px 20px;
  overflow-y:auto;
}
.modal-overlay.open{display:flex}
.modal-card{
  width:min(92vw,680px);
  background:linear-gradient(180deg,var(--panel),var(--bg));
  border:1px solid var(--line);border-radius:2px;
  position:relative;animation:modalIn .25s ease-out;
}
.modal-card::before{
  content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:60px;height:1px;background:var(--gold);
}
@keyframes modalIn{
  from{opacity:0;transform:translateY(-12px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.modal-head{
  padding:20px 28px 16px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--line-soft);
}
.modal-title{
  display:flex;align-items:center;gap:12px;
  font-family:"Cormorant Garamond",serif;
  font-size:20px;font-weight:500;letter-spacing:.02em;color:var(--ink);
}
.modal-accent{width:4px;height:18px;background:var(--gold);display:inline-block}
.modal-sub{
  font-family:"Noto Sans JP",sans-serif;
  font-size:10px;color:var(--ink-dim);letter-spacing:.2em;
  font-weight:400;margin-left:4px;
}
.modal-close{
  width:32px;height:32px;background:transparent;border:1px solid var(--line);
  color:var(--ink-mute);font-size:18px;line-height:1;cursor:pointer;
  border-radius:0;transition:all .2s;
}
.modal-close:hover{border-color:var(--danger);color:var(--danger)}
.modal-body{padding:24px 28px}
.form-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;
}
.form-field{display:flex;flex-direction:column;gap:6px}
.form-field.form-wide{grid-column:1 / -1}
.form-label{
  font-size:11px;color:var(--ink-mute);letter-spacing:.1em;
  display:flex;align-items:center;gap:8px;
}
.form-req{
  font-size:9px;padding:1px 6px;letter-spacing:.08em;
  background:rgba(212,165,116,.12);color:var(--gold);
  border:1px solid rgba(212,165,116,.3);
}
.form-hint{
  font-size:10px;color:var(--ink-dim);letter-spacing:.05em;
  margin-left:auto;font-weight:400;
}
.form-input{
  padding:10px 12px;background:var(--bg);border:1px solid var(--line);
  color:var(--ink);font-family:inherit;font-size:13px;
  border-radius:0;outline:none;transition:border .2s;
}
.form-input:focus{border-color:var(--gold)}
.form-readonly{color:var(--ink-dim);font-family:"JetBrains Mono",monospace;background:var(--panel-2)}
.form-select{
  appearance:none;-webkit-appearance:none;padding-right:32px;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%238fa3c0' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
  background-repeat:no-repeat;background-position:right 12px center;
  cursor:pointer;
}
.form-actions{
  display:flex;justify-content:flex-end;gap:10px;
  margin-top:20px;padding-top:18px;border-top:1px solid var(--line-soft);
}
@media(max-width:780px){
  .form-grid{grid-template-columns:1fr}
  .form-field.form-wide{grid-column:auto}
  .modal-body{padding:18px 20px}
  .modal-head{padding:16px 20px 12px}
}

/* New-record marker & row actions */
.new-mark{
  display:inline-block;padding:1px 5px;margin-left:6px;
  font-size:9px;letter-spacing:.08em;font-weight:600;
  background:var(--gold);color:#0a1220;
  font-family:"JetBrains Mono",monospace;
}
.edited-mark{
  display:inline-block;width:6px;height:6px;margin-left:6px;
  border-radius:50%;background:var(--accent);
  vertical-align:middle;
}
.row-actions{
  display:inline-flex;gap:4px;margin-left:8px;
  opacity:0;transition:opacity .15s;
  vertical-align:middle;
}
tr:hover .row-actions{opacity:1}
.row-btn{
  width:22px;height:22px;padding:0;
  background:transparent;border:1px solid var(--line);
  color:var(--ink-mute);cursor:pointer;border-radius:0;
  transition:all .15s;line-height:1;
  display:inline-flex;align-items:center;justify-content:center;
}
.row-btn svg{width:11px;height:11px}
.row-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(77,208,225,.08)}
.row-btn.danger:hover{border-color:var(--danger);color:var(--danger);background:rgba(248,113,113,.08)}

/* ========= TABLE ========= */
.table-wrap{
  overflow-x:auto;
  background:var(--bg);
}
table{
  width:100%;border-collapse:collapse;
  font-size:13px;
  min-width:1280px;
}
thead{
  position:sticky;top:0;z-index:10;
  background:var(--panel-2);
}
th{
  padding:12px 10px;text-align:left;
  font-size:10px;font-weight:600;letter-spacing:.15em;
  color:var(--ink-mute);text-transform:uppercase;
  border-bottom:1px solid var(--line);
  white-space:nowrap;
  cursor:pointer;user-select:none;
  transition:color .2s;
}
th:hover{color:var(--accent)}
th .sort-ind{margin-left:4px;color:var(--ink-dim);font-size:9px}
th.sorted .sort-ind{color:var(--accent)}
td{
  padding:10px;border-bottom:1px solid var(--line-soft);
  vertical-align:middle;
}
tr{transition:background .15s}
tr:hover td{background:var(--panel)}
tr.paid td{background:var(--paid-bg)}
tr.paid:hover td{background:rgba(74,222,128,.14)}
tr.expired td{background:var(--expired-bg)}
tr.expired:hover td{background:rgba(248,113,113,.12)}

.id-cell{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-dim)}
.name-cell{font-weight:500;color:var(--ink)}
.kana-cell{color:var(--ink-mute);font-size:12px}
.email-cell{
  font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-mute);
  max-width:240px;
}
.email-input{
  width:100%;min-width:180px;padding:5px 8px;
  background:transparent;border:1px solid transparent;
  color:var(--ink-mute);font-family:"JetBrains Mono",monospace;font-size:11px;
  border-radius:0;outline:none;
  transition:all .2s;
  text-overflow:ellipsis;
}
.email-input:hover{border-color:var(--line-soft)}
.email-input:focus{border-color:var(--accent);background:var(--bg);color:var(--ink)}
.fee-cell{font-family:"JetBrains Mono",monospace;text-align:right;color:var(--ink-mute)}
.date-cell{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-mute);white-space:nowrap}

.badge{
  display:inline-block;padding:2px 8px;
  font-size:10px;letter-spacing:.05em;
  border:1px solid;border-radius:0;white-space:nowrap;
}
.badge.ok{color:var(--ok);border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.05)}
.badge.warn{color:var(--warn);border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.05)}
.badge.danger{color:var(--danger);border-color:rgba(248,113,113,.4);background:rgba(248,113,113,.05)}
.badge.neutral{color:var(--ink-dim);border-color:var(--line)}
.badge.status{font-weight:500;padding:3px 10px;font-size:11px;letter-spacing:.08em}

/* Reset button */
.reset-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 12px;background:transparent;
  border:1px solid var(--line);
  color:var(--ink-mute);font-family:inherit;font-size:11px;letter-spacing:.15em;
  cursor:pointer;border-radius:0;transition:all .2s;
}
.reset-btn:hover{border-color:var(--danger);color:var(--danger);background:rgba(248,113,113,.04)}
.reset-btn svg{width:12px;height:12px}

.paid-input{
  width:120px;padding:5px 8px;
  background:var(--bg);border:1px solid var(--line);
  color:var(--ink);font-family:"JetBrains Mono",monospace;font-size:11px;
  border-radius:0;outline:none;
}
.paid-input:focus{border-color:var(--accent)}
tr.paid .paid-input{background:rgba(74,222,128,.05);border-color:rgba(74,222,128,.3);color:var(--ok)}

.memo-input{
  width:100%;min-width:140px;padding:5px 8px;
  background:transparent;border:1px solid transparent;
  color:var(--ink-mute);font-family:inherit;font-size:12px;
  border-radius:0;outline:none;
  transition:all .2s;
}
.memo-input:hover{border-color:var(--line-soft)}
.memo-input:focus{border-color:var(--accent);background:var(--bg);color:var(--ink)}

.empty{text-align:center;padding:60px 20px;color:var(--ink-dim);font-size:13px}

.footer{
  padding:16px 32px;border-top:1px solid var(--line-soft);
  display:flex;justify-content:space-between;align-items:center;
  font-size:11px;color:var(--ink-dim);letter-spacing:.1em;
  background:var(--panel);
}
.footer-left{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.legend{display:inline-flex;gap:14px;color:var(--ink-dim);letter-spacing:.08em}
.legend-item{display:inline-flex;align-items:center;gap:6px;font-size:10px}
.save-status{color:var(--ok);opacity:0;transition:opacity .3s}
.save-status.show{opacity:1}

/* Toast */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:200;
  padding:12px 20px;background:var(--panel-2);border:1px solid var(--accent);
  color:var(--ink);font-size:12px;letter-spacing:.05em;
  transform:translateY(100px);opacity:0;transition:all .3s;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.toast.show{transform:translateY(0);opacity:1}

/* Responsive */

<body>

<!-- LOGIN -->
<div id="login">
  <form class="login-card" onsubmit="doLogin(event)">
    <div class="login-brand">PSGA JAPAN</div>
    <div class="login-title">Renewal Ledger</div>
    <div class="login-sub">2026</div>
    <input id="pwInput" type="password" placeholder="パスワード" autocomplete="current-password">
    <button type="submit">Enter</button>
    <div class="login-err" id="loginErr"></div>
  </form>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div>
      <div class="brand-line">
        <span class="brand-mark">PSGA JAPAN</span>
        <h1 class="brand-title">Renewal Ledger</h1>
      </div>
      <div class="brand-sub">資格更新管理台帳　2026</div>
    </div>
    <div class="header-right">
      <span class="save-status" id="saveStatus">✓ 保存済み</span>
      <button class="issues-btn" onclick="toggleIssues()" id="issuesBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span>確認事項</span>
        <span class="issues-count" id="issuesCount">3</span>
      </button>
      <button class="reset-btn" onclick="openResetModal()" title="毎年4月の年度切替に使用">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        年度リセット
      </button>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <!-- Data issues panel -->
  <div class="issues-panel" id="issuesPanel">
    <div class="issues-head">
      <div class="issues-title">
        <span class="issues-accent"></span>
        データ確認事項
        <span class="issues-sub">原本Excelから検出・要ご判断</span>
      </div>
      <button class="issues-close" onclick="toggleIssues()" aria-label="閉じる">×</button>
    </div>
    <div class="issues-body" id="issuesBody"></div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="氏名・カナ・メール・ID で検索">
    </div>
    <select class="filter-select" id="statusFilter">
      <option value="">すべての状態</option>
      <option value="unchecked">未確認のみ</option>
      <option value="continuing">継続予定のみ</option>
      <option value="completed">更新完了のみ</option>
      <option value="declined">辞退のみ</option>
      <option value="not_renewed">今年度 未更新（要対応）</option>
    </select>
    <div class="kana-bar" id="kanaBar"></div>
    <div style="flex:1"></div>
    <button class="btn accent" onclick="openAddModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      新規追加
    </button>
    <button class="btn" onclick="exportCSV()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      CSV
    </button>
    <button class="btn primary" onclick="exportExcel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Excel
    </button>
  </div>

  <div class="table-wrap">
    <table id="tbl">
      <thead>
        <tr>
          <th data-sort="id">ID<span class="sort-ind">▾</span></th>
          <th data-sort="kana" class="sorted">カナ氏名<span class="sort-ind">▲</span></th>
          <th data-sort="name">氏名<span class="sort-ind">▾</span></th>
          <th data-sort="acq">取得年月日<span class="sort-ind">▾</span></th>
          <th>状況</th>
          <th data-sort="email">メールアドレス<span class="sort-ind">▾</span></th>
          <th data-sort="fee" style="text-align:right">更新料<span class="sort-ind">▾</span></th>
          <th data-sort="paid">入金日<span class="sort-ind">▾</span></th>
          <th>特記事項 / 備考</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="footer">
    <div class="footer-left">
      <span>PSGA JAPAN ® &nbsp;/&nbsp; 大丸プランニング</span>
      <span class="legend">
        <span class="legend-item"><span class="new-mark" style="margin-left:0">NEW</span>新規追加</span>
        <span class="legend-item"><span class="edited-mark" style="margin-left:0"></span>編集済み</span>
      </span>
    </div>
    <div id="countInfo">0 / 0 名</div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal-card">
    <div class="modal-head">
      <div class="modal-title">
        <span class="modal-accent"></span>
        <span id="modalTitleText">新規登録</span>
        <span class="modal-sub" id="modalSubText">新しい資格取得者を追加</span>
      </div>
      <button class="modal-close" onclick="closeAddModal()" aria-label="閉じる">×</button>
    </div>
    <form class="modal-body" id="addForm" onsubmit="submitAddForm(event)">
      <div class="form-grid">
        <label class="form-field">
          <span class="form-label">ID <span class="form-req">自動</span></span>
          <input type="text" id="f_id" readonly class="form-input form-readonly">
        </label>
        <label class="form-field">
          <span class="form-label">取得年月日 <span class="form-req">必須</span></span>
          <input type="text" id="f_acq" required class="form-input" placeholder="例：2026.04 または 2026.04.17">
        </label>
        <label class="form-field form-wide">
          <span class="form-label">更新ステータス <span class="form-hint">※今年度の継続確認状態</span></span>
          <select id="f_status" class="form-input form-select">
            <option value="unchecked">未確認</option>
            <option value="continuing">継続予定（入金待ち）</option>
            <option value="completed">更新完了（入金確認済み）</option>
            <option value="declined">辞退</option>
          </select>
        </label>
        <label class="form-field form-wide">
          <span class="form-label">氏名 <span class="form-req">必須</span></span>
          <input type="text" id="f_name" required class="form-input" placeholder="例：山田　太郎">
        </label>
        <label class="form-field form-wide">
          <span class="form-label">カナ氏名 <span class="form-req">必須</span><span class="form-hint">※ひらがな入力OK（自動でカタカナ変換）</span></span>
          <input type="text" id="f_kana" required class="form-input" placeholder="例：やまだ　たろう">
        </label>
        <label class="form-field form-wide">
          <span class="form-label">メールアドレス</span>
          <input type="email" id="f_email" class="form-input" placeholder="example@mail.com">
        </label>
        <label class="form-field">
          <span class="form-label">更新料</span>
          <input type="number" id="f_fee" class="form-input" value="5500">
        </label>
        <label class="form-field">
          <span class="form-label">入金日</span>
          <input type="date" id="f_paid" class="form-input">
        </label>
        <label class="form-field form-wide">
          <span class="form-label">特記事項 / 備考</span>
          <input type="text" id="f_note" class="form-input" placeholder="例：継続希望・WS2回受講必須">
        </label>
      </div>
      <div class="form-actions">
        <button type="button" class="btn" onclick="closeAddModal()">キャンセル</button>
        <button type="submit" class="btn primary">登録する</button>
      </div>
    </form>
  </div>
</div>

/* ======= HIRA→KATA ======= */
function hiraToKata(s){
  if(!s) return "";
  let out = "";
  for(const ch of String(s)){
    const code = ch.charCodeAt(0);
    if(code >= 0x3041 && code <= 0x3096) out += String.fromCharCode(code + 0x60);
    else out += ch;
  }
  return out.replace(/[　\s]+/g, "　").replace(/^[　\s]+|[　\s]+$/g, "");
}

/* ======= STATE ======= */
const MUTABLE_FIELDS = ["name","kana","acq","email","fee","paid","memo","note","renewStatus"];

const STATUS_META = {
  "unchecked":  { label: "未確認",   badge: "neutral", rowCls: "" },
  "continuing": { label: "継続予定", badge: "warn",    rowCls: "" },
  "completed":  { label: "更新完了", badge: "ok",      rowCls: "paid" },
  "declined":   { label: "辞退",     badge: "danger",  rowCls: "expired" }
};

// Infer initial status for records lacking an explicit renewStatus field
function inferStatus(r){
  if(r.renewStatus) return r.renewStatus;
  if(r.paid) return "completed";
  if(r.note && r.note.includes("継続希望")) return "continuing";
  return "unchecked";
}

function isEdited(rec, init){
  if(!init) return false;
  const initStatus = inferStatus(init);
  return MUTABLE_FIELDS.some(k => {
    if(k === "renewStatus") return (rec.renewStatus ?? "unchecked") !== initStatus;
    return (rec[k] ?? "") !== (init[k] ?? "");
  });
}

function loadState(){
  // Base: initial + mutations on initial (full field overwrite)
  const saved = localStorage.getItem(STORAGE_KEY);
  const initMap = {};
  INITIAL_DATA.forEach(r => initMap[r.id] = r);

  let base;
  if(saved){
    try{
      const parsed = JSON.parse(saved);
      if(Array.isArray(parsed)){
        const savedMap = {};
        parsed.forEach(r => savedMap[r.id] = r);
        base = INITIAL_DATA.map(r => {
          const s = savedMap[r.id];
          if(s){
            const merged = { ...r, ...s };
            merged.renewStatus = merged.renewStatus || inferStatus(merged);
            merged._edited = isEdited(merged, r);
            return merged;
          }
          const fresh = { ...r };
          fresh.renewStatus = inferStatus(fresh);
          return fresh;
        });
      }
    }catch(e){ console.warn("Load failed:", e); }
  }
  if(!base){
    base = INITIAL_DATA.map(r => {
      const fresh = { ...r };
      fresh.renewStatus = inferStatus(fresh);
      return fresh;
    });
  }

  // Append newly-added records
  const newSaved = localStorage.getItem(NEW_KEY);
  if(newSaved){
    try{
      const arr = JSON.parse(newSaved);
      if(Array.isArray(arr)){
        arr.forEach(r => {
          const n = { ...r, isNew: true };
          n.renewStatus = n.renewStatus || "unchecked";
          base.push(n);
        });
      }
    }catch(e){ console.warn("Load new failed:", e); }
  }
  records = base;
}

function saveState(){
  const initMap = {};
  INITIAL_DATA.forEach(r => initMap[r.id] = r);
  // Save only original records that differ from INITIAL
  const modified = [];
  records.filter(r => !r.isNew).forEach(r => {
    const init = initMap[r.id];
    if(!init) return;
    if(isEdited(r, init)){
      const out = { id: r.id };
      MUTABLE_FIELDS.forEach(k => { out[k] = r[k]; });
      modified.push(out);
      r._edited = true;
    } else {
      r._edited = false;
    }
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(modified));

  // Save new records (full)
  const newOnes = records.filter(r => r.isNew).map(r => {
    const { isNew, _edited, ...rest } = r;
    return rest;
  });
  localStorage.setItem(NEW_KEY, JSON.stringify(newOnes));

  const el = document.getElementById("saveStatus");
  el.classList.add("show");
  clearTimeout(saveState._t);
  saveState._t = setTimeout(() => el.classList.remove("show"), 1400);
}
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("show"), 2200);
}

const KANA_HEADS = ["全", "ア","カ","サ","タ","ナ","ハ","マ","ヤ","ラ","ワ"];
const KANA_GROUPS = {
  "ア":["ア","イ","ウ","エ","オ"],
  "カ":["カ","キ","ク","ケ","コ","ガ","ギ","グ","ゲ","ゴ"],
  "サ":["サ","シ","ス","セ","ソ","ザ","ジ","ズ","ゼ","ゾ"],
  "タ":["タ","チ","ツ","テ","ト","ダ","ヂ","ヅ","デ","ド"],
  "ナ":["ナ","ニ","ヌ","ネ","ノ"],
  "ハ":["ハ","ヒ","フ","ヘ","ホ","バ","ビ","ブ","ベ","ボ","パ","ピ","プ","ペ","ポ"],
  "マ":["マ","ミ","ム","メ","モ"],
  "ヤ":["ヤ","ユ","ヨ"],
  "ラ":["ラ","リ","ル","レ","ロ"],
  "ワ":["ワ","ヲ","ン"]
};

function renderStats(){
  const total = records.length;
  const unchecked = records.filter(r => (r.renewStatus || "unchecked") === "unchecked").length;
  const continuing = records.filter(r => r.renewStatus === "continuing").length;
  const completed = records.filter(r => r.renewStatus === "completed").length;
  const declined = records.filter(r => r.renewStatus === "declined").length;
  const paidYen = records.filter(r => r.paid).reduce((sum, r) => sum + (r.fee || 0), 0);

  const stats = [
    { label: "登録者数", value: total, unit: "名", filter: null },
    { label: "未確認", value: unchecked, unit: "名", filter: "unchecked" },
    { label: "継続予定", value: continuing, unit: "名", filter: "continuing" },
    { label: "更新完了", value: completed, unit: "名", filter: "completed" },
    { label: "辞退", value: declined, unit: "名", filter: "declined" },
    { label: "入金合計", value: "¥" + paidYen.toLocaleString(), unit: "", filter: null },
  ];
  const wrap = document.getElementById("stats");
  wrap.innerHTML = "";
  stats.forEach(s => {
    const d = document.createElement("div");
    d.className = "stat" + (s.filter && filters.status === s.filter ? " active" : "");
    if(s.filter){
      d.onclick = () => {
        filters.status = (filters.status === s.filter) ? "" : s.filter;
        document.getElementById("statusFilter").value = filters.status;
        render();
      };
    }
    d.innerHTML = `<div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.value}${s.unit ? '<span class="unit">'+s.unit+'</span>' : ''}</div>`;
    wrap.appendChild(d);
  });
}

function matchesFilter(r){
  if(filters.q){
    const q = filters.q.toLowerCase();
    const hay = (r.name + " " + r.kana + " " + r.email + " " + r.id).toLowerCase();
    if(!hay.includes(q)) return false;
  }
  if(filters.kana){
    const group = KANA_GROUPS[filters.kana] || [];
    const first = (r.kana || "").charAt(0);
    if(!group.includes(first)) return false;
  }
  if(filters.status){
    const s = r.renewStatus || "unchecked";
    if(filters.status === "not_renewed"){
      if(s !== "unchecked" && s !== "continuing") return false;
    } else if(filters.status !== s){
      return false;
    }
  }
  return true;
}

function sortRecords(arr){
  const k = sortKey, d = sortDir;
  return [...arr].sort((a,b) => {
    const va = (a[k] || "").toString();
    const vb = (b[k] || "").toString();
    if(k === "fee") return (a.fee - b.fee) * d;
    return va.localeCompare(vb, "ja") * d;
  });
}

function renderTable(){
  const tbody = document.getElementById("tbody");
  const filtered = sortRecords(records.filter(matchesFilter));

  document.getElementById("countInfo").textContent = `${filtered.length} / ${records.length} 名`;

  if(filtered.length === 0){
    tbody.innerHTML = `<tr><td colspan="9" class="empty">該当するレコードがありません</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(r => {
    const status = r.renewStatus || "unchecked";
    const meta = STATUS_META[status] || STATUS_META.unchecked;
    const cls = meta.rowCls;

    const statusBadge = `<span class="badge status ${meta.badge}">${meta.label}</span>`;
    let extraBadge = "";
    if(r.paid && status !== "completed") extraBadge += ' <span class="badge ok">入金</span>';

    const noteEsc = escapeHtml(r.note || "");

    return `<tr class="${cls}" data-id="${r.id}">
      <td class="id-cell">${r.id}${r.isNew ? '<span class="new-mark">NEW</span>' : ''}${r._edited ? '<span class="edited-mark" title="編集済み"></span>' : ''}</td>
      <td class="kana-cell">${escapeHtml(r.kana)}</td>
      <td class="name-cell">${escapeHtml(r.name)}<span class="row-actions">
        <button class="row-btn" onclick="openEditModal('${r.id}')" title="詳細確認 / 編集"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        ${r.isNew ? `<button class="row-btn danger" onclick="deleteRecord('${r.id}')" title="削除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>` : ''}
      </span></td>
      <td class="date-cell">${escapeHtml(r.acq)}</td>
      <td>${statusBadge}${extraBadge}</td>
      <td class="email-cell"><input type="email" class="email-input" value="${escapeHtml(r.email)}" title="${escapeHtml(r.email)}" onchange="updateEmail('${r.id}', this.value)"></td>
      <td class="fee-cell">¥${r.fee.toLocaleString()}</td>
      <td><input type="date" class="paid-input" value="${r.paid || ''}" onchange="updatePaid('${r.id}', this.value)"></td>
      <td><input type="text" class="memo-input" value="${noteEsc}" placeholder="メモ" onchange="updateNote('${r.id}', this.value)"></td>
    </tr>`;
  }).join("");
}

function escapeHtml(s){
  if(!s) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function render(){
  renderKanaBar();
  renderStats();
  renderTable();
}

/* ======= ACTIONS ======= */
function syncEditMark(tr, r){
  if(!tr || r.isNew) return;
  const idCell = tr.children[0];
  const existingMark = idCell.querySelector(".edited-mark");
  if(r._edited && !existingMark){
    const s = document.createElement("span");
    s.className = "edited-mark";
    s.title = "編集済み";
    idCell.appendChild(s);
  } else if(!r._edited && existingMark){
    existingMark.remove();
  }
}

function updatePaid(id, val){
  const r = records.find(x => x.id === id);
  if(!r) return;
  r.paid = val;
  // Auto-advance status: entering a paid date implies 更新完了 (unless explicitly declined)
  if(val && r.renewStatus !== "declined"){
    r.renewStatus = "completed";
  } else if(!val && r.renewStatus === "completed"){
    // Clearing paid reverts completed → continuing (requires re-confirmation)
    r.renewStatus = "continuing";
  }
  saveState();
  renderStats();
  // Full row re-render for this row (status/class changes)
  const tr = document.querySelector(`tr[data-id="${id}"]`);
  if(tr){
    const meta = STATUS_META[r.renewStatus] || STATUS_META.unchecked;
    tr.className = meta.rowCls + (r.isNew ? "" : "");
    const badgeCell = tr.children[4];
    let html = `<span class="badge status ${meta.badge}">${meta.label}</span>`;
    if(val && r.renewStatus !== "completed") html += ' <span class="badge ok">入金</span>';
    badgeCell.innerHTML = html;
    syncEditMark(tr, r);
  }
}
function updateNote(id, val){
  const r = records.find(x => x.id === id);
  if(!r) return;
  r.note = val;
  saveState();
  const tr = document.querySelector(`tr[data-id="${id}"]`);
  if(tr) syncEditMark(tr, r);
}
function updateEmail(id, val){
  const r = records.find(x => x.id === id);
  if(!r) return;
  r.email = val.trim();
  saveState();
  const tr = document.querySelector(`tr[data-id="${id}"]`);
  if(tr){
    // Update the title tooltip on the cell
    const td = tr.children[5];
    if(td) td.title = r.email;
    syncEditMark(tr, r);
  }
}

/* ======= ADD / EDIT RECORD ======= */
let currentEditId = null;  // null = add mode, id string = edit mode

function nextId(){
  let maxN = 0;
  records.forEach(r => {
    const m = String(r.id || "").match(/^0?3?0?0?(\d+)$/);
    if(m){
      const n = parseInt(m[1], 10);
      if(n > maxN) maxN = n;
    }
  });
  const next = maxN + 1;
  return "03" + String(next).padStart(5, "0");
}

function setModalMode(mode, rec){
  const titleText = document.getElementById("modalTitleText");
  const subText = document.getElementById("modalSubText");
  const submitBtn = document.querySelector("#addForm button[type=submit]");
  if(mode === "edit"){
    titleText.textContent = "登録情報の修正";
    subText.textContent = rec && rec.isNew ? "新規追加した登録者の編集" : "既存登録者の編集";
    submitBtn.textContent = "保存する";
  } else {
    titleText.textContent = "新規登録";
    subText.textContent = "新しい資格取得者を追加";
    submitBtn.textContent = "登録する";
  }
}

function submitAddForm(ev){
  ev.preventDefault();
  const formData = {
    name: document.getElementById("f_name").value.trim(),
    kana: hiraToKata(document.getElementById("f_kana").value.trim()),
    acq: document.getElementById("f_acq").value.trim(),
    email: document.getElementById("f_email").value.trim(),
    fee: parseInt(document.getElementById("f_fee").value, 10) || 5500,
    paid: document.getElementById("f_paid").value,
    note: document.getElementById("f_note").value.trim(),
    renewStatus: document.getElementById("f_status").value || "unchecked",
  };

  if(currentEditId){
    const r = records.find(x => x.id === currentEditId);
    if(!r){ closeAddModal(); return; }
    Object.assign(r, formData);
    saveState();
    closeAddModal();
    render();
    toast(`修正しました：${r.name}`);
    setTimeout(() => flashRow(r.id, "accent"), 200);
  } else {
    const newId = document.getElementById("f_id").value.trim();
    if(records.some(x => x.id === newId)){
      alert("IDが重複しています。ページを再読み込みしてください。");
      return;
    }
    const newRec = {
      id: newId,
      ...formData,
      status: "", ws: "", clear: "", memo: "", ws1: "", ws2: "",
      historyStr: "", isNew: true
    };
    records.push(newRec);
    saveState();
    closeAddModal();
    render();
    toast(`登録しました：${newRec.name}`);
    setTimeout(() => flashRow(newRec.id, "gold"), 200);
  }
}

function flashRow(id, color){
  const tr = document.querySelector(`tr[data-id="${id}"]`);
  if(!tr) return;
  tr.scrollIntoView({ behavior: "smooth", block: "center" });
  tr.style.transition = "background .3s";
  tr.style.background = color === "gold" ? "rgba(212,165,116,.2)" : "rgba(77,208,225,.2)";
  setTimeout(() => { tr.style.background = ""; }, 1800);
}

function deleteRecord(id){
  const r = records.find(x => x.id === id);
  if(!r) return;
  if(!r.isNew){
    alert("原本データは削除できません。");
    return;
  }
  if(!confirm(`${r.name} さんを削除しますか？\n（新規追加された方のみ削除可能）`)) return;
  records = records.filter(x => x.id !== id);
  saveState();
  render();
  toast(`削除しました：${r.name}`);
}

  const msg =
    `【年度リセット】\n\n` +
    `全員の更新ステータスを「未確認」に戻し、入金日をクリアします。\n` +
    `名前・カナ・メール・取得年月日・備考はそのまま残ります。\n\n` +
    `● 現在の状態：\n` +
    `　・更新完了 ${currentCompleted} 名\n` +
    `　・入金日あり ${currentPaid} 名\n\n` +
    `⚠ この操作は取り消せません。\n` +
    `リセット前に Excel エクスポートで控えを保存することを推奨します。\n\n` +
    `実行してよろしいですか？`;
  if(!confirm(msg)) return;
  // Second confirmation
  const confirmText = prompt('最終確認：実行する場合は「リセット」と入力してください', "");
  if(confirmText !== "リセット"){
    toast("キャンセルしました");
    return;
  }
  records.forEach(r => {
    r.paid = "";
    r.renewStatus = "unchecked";
  });
  saveState();
  render();
  toast(`${records.length} 名分のステータスをリセットしました`);
}

/* ======= INIT ======= */
function init(){
  loadState();
  render();
  renderIssues();
  // Auto-open issues panel on first login of the session
  if(!sessionStorage.getItem("psga_issues_seen")){
    document.getElementById("issuesPanel").classList.add("open");
  } else {
    document.getElementById("issuesBtn").classList.add("dismissed");
  }
  document.getElementById("search").addEventListener("input", e => {
    filters.q = e.target.value;
    render();
  });
  document.getElementById("statusFilter").addEventListener("change", e => {
    filters.status = e.target.value;
    renderStats();
    renderTable();
  });
}

/* ======= BOOT ======= */
if(sessionStorage.getItem("psga_auth") === "1"){
  showApp();
} else {
  document.getElementById("pwInput").focus();
}
</script>
</body>
</html>
